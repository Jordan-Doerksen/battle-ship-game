<!-- ================================================================================
  THE STRAIT OF HORMUZ — "THE TEMPEST" · ONE PAGE, EVERYTHING TOGGLEABLE
  Mockup gate (DECISIONS.md law: mock → approve → port). This page proposes THREE
  additions on top of the APPROVED C9 sea (direction B "HEAVY WEATHER", carried
  verbatim — same palette, line weights, hull art; the C2 LOOK-LOCK is untouched):

    1. WEATHER — four states as presets: CLEAR · PASSING RAIN · SQUALL LINE ·
       THUNDERHEAD. Top-down rain (wind-angled screen streaks + sea dimple rings +
       a visibility veil), gust curtains, and lightning (photosensitivity-safe:
       full-screen flash veil hard-capped at 0.16 alpha, ≥4 s between strikes,
       reduced-motion kills the flash entirely and keeps only the water glow).
       RENDER-ONLY here; every gameplay coupling (radar/sonar attenuation, reveal
       flashes) is an interview question, not a mockup claim.
    2. WHIRLPOOL — one restrained vortex (sibling of fulfillment's black holes,
       re-derived, dialed way down): slow foam spiral arms in the fleck language,
       subtle darkening, circling debris. The PULL demo bends the ship, torpedoes,
       and flotsam — never a screen-dominating gravity well. Placement/pull rules
       for the sim (seeded with C15 terrain, arithmetic-only force in Movement.step)
       are noted for the spec interview.
    3. THE DETAIL PASS — eight micro-details, individually toggleable so each is
       judged on its own: funnel smoke (throttle+wind aware) · ejected casings ·
       gulls (they leave in weather) · drifting flotsam · wreck oil slick + bubbles ·
       bow spray · bridge signal lamp · channel buoy. All render-only.

  The scene tours: autopilot loiters a slow circuit past the vortex, the buoy and
  the wreck while two gunboats straddle her, the racks roll, and a torpedo passes
  (watch it bend near the vortex). WASD overrides the helm · P pauses.
  Reduced motion (house law): sea/rain/spiral/flash freeze or die; discs stay.
================================================================================= -->

<script>
"use strict";
/* ════════ CONFIG — every knob maps 1:1 onto planned .tres additions ════════
   weather.* → a future WeatherConfig/weather.tres · vortex.* → TerrainConfig or its own
   HazardConfig · detail toggles → FieldConfig. Sea tables are the APPROVED C9-B values. */
const DEFAULT_CFG = {
  swell:  { amp: 0.95, speed: 1.4, scale: 1.15 },
  glint:  { intensity: 0.75 },
  foam:   { density: 210, crest_bias: 0.85, crest_streaks: 0.8 },
  ship:   { heave_px: 3.0, roll_deg: 2.6, shadow_px: 5.0 },
  splash: { scale: 1.4, foam_life: 3.4, dye: true },
  wake:   { life: 9.0, width: 1.35 },
  view:   { zoom: 1.0 },
  wx:     { rain: 0.0, wind: 0.25, bearing: 205, veil: 0.0, bolt_period: 9.0, bolts: 0 },
  vortex: { on: 1, pull: 1, ring: 0, R: 170, tang: 30, inward: 11, spin: 0.5 },
  det:    { smoke: 1, casings: 1, gulls: 1, flotsam: 1, wreck: 1, spray: 1, lamp: 1, buoy: 1 },
};
let cfg = structuredClone(DEFAULT_CFG);
const MOVE = {   // C1 movement, owner-approved — unchanged
  max_speed_ahead: 220.0, astern_frac: 0.35, thrust_accel: 55.0, brake_accel: 90.0,
  drag_forward: 0.08, drag_lateral: 1.8, turn_rate_max: 0.55, turn_speed_floor: 0.25,
};
const SIM_DT = 1 / 60, TAU = Math.PI * 2;
const SUN = { x: -0.55, y: -0.835 }, SHADOW = { x: 0.55, y: 0.835 };

/* ════════ UTIL (C9 kit, verbatim) ════════ */
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rng = mulberry32(0x7E4A57);
function mod(a, n) { return ((a % n) + n) % n; }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function sstep(e0, e1, x) { const t = clamp((x - e0) / (e1 - e0), 0, 1); return t * t * (3 - 2 * t); }
function easeOutBack(k) { const c = 1.70158, x = k - 1; return 1 + (c + 1) * x * x * x + c * x * x; }
function dirOf(a) { return { x: Math.sin(a), y: -Math.cos(a) }; }
function angleTo(from, to) { return Math.atan2(to.x - from.x, -(to.y - from.y)); }
function angDiff(a, b) { return ((a - b + Math.PI) % TAU + TAU) % TAU - Math.PI; }
function hash2(x, y) { const s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453; return s - Math.floor(s); }
function vnoise(x, y) {
  const xi = Math.floor(x), yi = Math.floor(y), xf = x - xi, yf = y - yi;
  const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
  return hash2(xi, yi) * (1 - u) * (1 - v) + hash2(xi + 1, yi) * u * (1 - v)
       + hash2(xi, yi + 1) * (1 - u) * v + hash2(xi + 1, yi + 1) * u * v;
}

/* ════════ CANVAS / CAMERA ════════ */
const canvas = document.getElementById("sea");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
addEventListener("resize", resize);
resize();
const cam = { x: 0, y: 0 };
function w2s(wx, wy) { const z = cfg.view.zoom; return [(wx - cam.x) * z + W / 2, (wy - cam.y) * z + H / 2]; }
function hfFade() { return sstep(0.42, 0.75, cfg.view.zoom); }

/* ════════ SWELL BANDS + analytic twin (C9, verbatim) ════════ */
const TILE = 512;
function buildBandTile(waves, lightA, darkA) {
  const c = document.createElement("canvas"); c.width = c.height = TILE;
  const g = c.getContext("2d");
  const img = g.createImageData(TILE, TILE), d = img.data;
  for (let y = 0; y < TILE; y++) for (let x = 0; x < TILE; x++) {
    let h = 0;
    for (const [nx, ny, amp, ph] of waves) h += amp * Math.sin(TAU * (nx * x + ny * y) / TILE + ph);
    const i = (y * TILE + x) * 4;
    if (h > 0) { d[i] = 62; d[i + 1] = 112; d[i + 2] = 128; d[i + 3] = Math.round(sstep(0.18, 0.95, h) * lightA * 255); }
    else       { d[i] = 3;  d[i + 1] = 10;  d[i + 2] = 15;  d[i + 3] = Math.round(sstep(0.18, 0.95, -h) * darkA * 255); }
  }
  g.putImageData(img, 0, 0);
  return ctx.createPattern(c, "repeat");
}
const BAND_LAYERS = [
  { pat: buildBandTile([[2, 1, 0.55, 0.7], [1, 2, 0.30, 2.9], [3, -1, 0.15, 5.1]], 0.16, 0.20),
    scale: 2.3, alpha: 1.0, dx: 8.5, dy: 8.5, hf: false },
  { pat: buildBandTile([[4, 3, 0.50, 1.3], [3, -4, 0.30, 4.0], [6, 2, 0.20, 0.5]], 0.10, 0.12),
    scale: 1.15, alpha: 0.8, dx: -10, dy: 14, hf: true },
];
function drawSwell(seaT) {
  const z = cfg.view.zoom, fade = hfFade();
  for (const L of BAND_LAYERS) {
    const s = z * cfg.swell.scale * L.scale, per = TILE * s;
    const ox = mod(W / 2 - cam.x * z + L.dx * seaT * cfg.swell.speed * z, per);
    const oy = mod(H / 2 - cam.y * z + L.dy * seaT * cfg.swell.speed * z, per);
    ctx.save();
    ctx.globalAlpha = cfg.swell.amp * L.alpha * (L.hf ? 0.35 + 0.65 * fade : 1);
    ctx.translate(ox - per, oy - per);
    ctx.scale(s, s);
    ctx.fillStyle = L.pat;
    ctx.fillRect(0, 0, (W + 2 * per) / s, (H + 2 * per) / s);
    ctx.restore();
  }
}
function swellH(wx, wy, seaT) {
  const k = 0.0035 / Math.max(0.2, cfg.swell.scale), sp = cfg.swell.speed;
  return 0.6 * Math.sin((wx * 0.71 + wy * 0.71) * k + seaT * 0.25 * sp)
       + 0.4 * Math.sin((wx * 0.44 - wy * 0.90) * k * 1.9 - seaT * 0.37 * sp);
}

/* ════════ CHART GRID · GLINTS · FLECKS · STREAKS (C9, verbatim) ════════ */
function drawGrid() {
  const z = cfg.view.zoom;
  for (const [step, a] of [[200, 0.035], [1000, 0.07]]) {
    ctx.strokeStyle = `rgba(228,240,242,${a})`; ctx.lineWidth = 1; ctx.beginPath();
    const wx0 = cam.x - (W / 2) / z, wy0 = cam.y - (H / 2) / z;
    for (let gx = Math.floor(wx0 / step) * step; ; gx += step) {
      const px = (gx - cam.x) * z + W / 2; if (px > W) break;
      ctx.moveTo(px, 0); ctx.lineTo(px, H);
    }
    for (let gy = Math.floor(wy0 / step) * step; ; gy += step) {
      const py = (gy - cam.y) * z + H / 2; if (py > H) break;
      ctx.moveTo(0, py); ctx.lineTo(W, py);
    }
    ctx.stroke();
  }
}
function drawGlints(seaT) {
  const inten = cfg.glint.intensity * hfFade() * (1 - cfg.wx.veil * 0.8);   // rain kills the light-catches
  if (inten <= 0.02) return;
  const z = cfg.view.zoom;
  const cell = Math.max(24, Math.round(42 / z));
  const wx0 = cam.x - (W / 2) / z, wy0 = cam.y - (H / 2) / z;
  const wx1 = cam.x + (W / 2) / z, wy1 = cam.y + (H / 2) / z;
  ctx.fillStyle = "rgba(228,240,242,1)";
  for (let gy = Math.floor(wy0 / cell); gy * cell < wy1 + cell; gy++)
    for (let gx = Math.floor(wx0 / cell); gx * cell < wx1 + cell; gx++) {
      const jx = hash2(gx, gy), jy = hash2(gx + 57.3, gy - 11.9);
      const px = (gx + jx) * cell, py = (gy + jy) * cell;
      const n1 = vnoise(px * 0.012 + seaT * 0.55, py * 0.012 + seaT * 0.40);
      const n2 = vnoise(px * 0.017 - seaT * 0.45, py * 0.017 + seaT * 0.35);
      const m = sstep(0.42, 0.58, n1 * n2);
      if (m <= 0.03) continue;
      const [sx, sy] = w2s(px, py);
      ctx.globalAlpha = m * 0.5 * inten;
      ctx.fillRect(sx - 1.5, sy - 0.5, 3, 1);
    }
  ctx.globalAlpha = 1;
}
const FLECK_TILE = 1600, FLECK_MAX = 260, FLECKS = [];
for (let i = 0; i < FLECK_MAX; i++)
  FLECKS.push({ x: rng() * FLECK_TILE, y: rng() * FLECK_TILE, len: 3 + rng() * 9, ph: rng() * TAU });
function drawFlecks(seaT, reduced) {
  const z = cfg.view.zoom, fade = 0.45 + 0.55 * hfFade();
  const n = Math.min(FLECK_MAX, Math.round(cfg.foam.density));
  const bias = cfg.foam.crest_bias;
  for (let i = 0; i < n; i++) {
    const f = FLECKS[i];
    const wx = mod(f.x - cam.x + FLECK_TILE / 2, FLECK_TILE) - FLECK_TILE / 2 + cam.x;
    const wy = mod(f.y - cam.y + FLECK_TILE / 2, FLECK_TILE) - FLECK_TILE / 2 + cam.y;
    const [px, py] = w2s(wx, wy);
    if (px < -20 || px > W + 20 || py < -20 || py > H + 20) continue;
    const crest = sstep(0.1, 0.9, (swellH(wx, wy, seaT) + 1) / 2);
    const a = 0.16 * (1 - bias * 0.65 + bias * 1.3 * crest) * fade;
    if (a <= 0.01) continue;
    const bob = reduced ? 0 : Math.sin(seaT * 0.6 + f.ph) * 1.5;
    const len = f.len * (0.8 + 0.5 * crest) * z;
    ctx.strokeStyle = `rgba(228,240,242,${a.toFixed(3)})`;
    ctx.lineWidth = 1; ctx.beginPath();
    ctx.moveTo(px - len / 2, py + bob * z); ctx.lineTo(px + len / 2, py + bob * z);
    ctx.stroke();
  }
}
const STREAKS = [];
function stepStreaks(dt, reduced) {
  const inten = cfg.foam.crest_streaks;
  if (reduced || inten <= 0.02) { STREAKS.length = 0; return; }
  const z = cfg.view.zoom;
  for (let k = 0; k < 3; k++) {
    if (rng() > inten * 0.75) continue;
    const wx = cam.x + (rng() - 0.5) * W / z, wy = cam.y + (rng() - 0.5) * H / z;
    if (swellH(wx, wy, seaT) < 0.55) continue;
    STREAKS.push({ x: wx, y: wy, t0: simT, life: 1.6 + rng() * 1.2,
                   len: 18 + rng() * 26, ang: -Math.PI / 4 + (rng() - 0.5) * 0.5 });
    if (STREAKS.length > 90) STREAKS.shift();
  }
}
function drawStreaks() {
  const z = cfg.view.zoom, fade = 0.45 + 0.55 * hfFade();
  for (let i = STREAKS.length - 1; i >= 0; i--) {
    const s = STREAKS[i], k = (simT - s.t0) / s.life;
    if (k >= 1) { STREAKS.splice(i, 1); continue; }
    const a = 0.30 * Math.sin(Math.PI * k) * fade * cfg.foam.crest_streaks;
    if (a <= 0.01) continue;
    const dx = Math.cos(s.ang), dy = Math.sin(s.ang);
    const half = s.len * (0.5 + 0.7 * k) * z / 2;
    const [px, py] = w2s(s.x, s.y);
    ctx.strokeStyle = `rgba(228,240,242,${a.toFixed(3)})`;
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(px - dx * half, py - dy * half);
    ctx.quadraticCurveTo(px - dy * 4 * z, py + dx * 4 * z, px + dx * half, py + dy * half);
    ctx.stroke();
  }
}

/* ════════ THE WHIRLPOOL — the one new hazard, restrained by design ════════
   Visual: three log-spiral arms of foam DASHES (the fleck language — never solid
   lines), a subtle darkening well, two circling debris motes. The influence ring is
   a dev aid only. Pull (demo of the sim rule): tangential + weak inward acceleration
   with a smoothstep falloff; a ship at speed crosses it with a course bend — only a
   slow/parked hull spirals. In Godot: seeded placement beside C15 terrain, force
   applied in Movement.step — pure arithmetic, ZERO rng. */
const VORTEX = { x: 350, y: -350, dir: 1 };   // dir: 1 = clockwise
function vortexAccel(px, py) {
  const v = cfg.vortex;
  const dx = px - VORTEX.x, dy = py - VORTEX.y;
  const d = Math.hypot(dx, dy);
  if (!v.on || !v.pull || d >= v.R || d < 4) return null;
  const k = Math.pow(1 - d / v.R, 1.35);          // gentle edge, firmer core
  const nx = dx / d, ny = dy / d;
  const tx = -ny * VORTEX.dir, ty = nx * VORTEX.dir;
  return { x: tx * v.tang * k - nx * v.inward * k, y: ty * v.tang * k - ny * v.inward * k };
}
function drawVortex(reduced) {
  const v = cfg.vortex;
  if (!v.on) return;
  const z = cfg.view.zoom;
  const [cx, cy] = w2s(VORTEX.x, VORTEX.y);
  if (cx < -v.R * z - 40 || cx > W + v.R * z + 40 || cy < -v.R * z - 40 || cy > H + v.R * z + 40) return;
  const Rz = v.R * z;
  const well = ctx.createRadialGradient(cx, cy, 0, cx, cy, Rz * 0.85);   // the darkening — subtle
  well.addColorStop(0, "rgba(3,10,15,0.34)");
  well.addColorStop(0.55, "rgba(3,10,15,0.16)");
  well.addColorStop(1, "rgba(3,10,15,0)");
  ctx.fillStyle = well;
  ctx.beginPath(); ctx.arc(cx, cy, Rz * 0.85, 0, TAU); ctx.fill();
  const rot = (reduced ? 0 : seaT * v.spin) * VORTEX.dir;
  for (let arm = 0; arm < 3; arm++) {                       // spiral arms as foam dashes
    const ph0 = arm * TAU / 3 + rot;
    for (let i = 0; i < 24; i++) {
      const t = i / 23;
      const th = ph0 + t * 3.4 * VORTEX.dir;
      const r = v.R * (0.94 - 0.86 * t);
      const wx = VORTEX.x + Math.sin(th) * r, wy = VORTEX.y - Math.cos(th) * r;
      const [px, py] = w2s(wx, wy);
      const a = (0.05 + 0.13 * t) * (0.6 + 0.4 * hfFade());

    const bx = c[0] + (p1[0] - c[0]) * t, by = c[1] + (p1[1] - c[1]) * t;

  quad([-6, 35], [-10, 32], [-10, 20], 6); pts.push([-9.5, -24]);

  ctx.beginPath(); ctx.arc(0, 65, 14, 0, TAU); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-8, 65); ctx.lineTo(8, 65); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -120); ctx.lineTo(0, -90); ctx.stroke();
  if (cfg.det.lamp && lampOn()) {                            // DETAIL: the signal lamp on the bridge wing
    ctx.fillStyle = "rgba(228,240,242,0.95)";
    ctx.beginPath(); ctx.arc(6, -39, 1.3, 0, TAU); ctx.fill();
    ctx.fillStyle = "rgba(228,240,242,0.14)";
    ctx.beginPath(); ctx.arc(6, -39, 5, 0, TAU); ctx.fill();
  }
  for (let i = 0; i < MOUNTS.length; i++) {
    const mc = MOUNTS[i], m = mounts[i];
    RECOIL[i] *= 0.9;
    const rec = RECOIL[i];
    ctx.save(); ctx.translate(mc.x, mc.y);
    ctx.strokeStyle = "rgba(228,240,242,0.25)";
    if (mc.size === "L") { ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(0, 0, 11.5, 0, TAU); ctx.stroke(); }
    if (mc.size === "M") { ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, 0, 7.5, 0, TAU); ctx.stroke(); }
    ctx.rotate(m.ang - ship.heading);
    if (mc.size === "L") {
      ctx.fillStyle = "#93A7AE";
      for (const bx of [-3.2, 3.2]) {
        ctx.fillRect(bx - 1.3, -9 - 26 + rec * 4, 2.6, 26);
        ctx.fillRect(bx - 1.9, -9 - 26 + rec * 4, 3.8, 3);
      }
      ctx.fillStyle = "#647885";
      ctx.beginPath();
      ctx.moveTo(-8, 12); ctx.lineTo(-8, -4); ctx.quadraticCurveTo(-8, -10, 0, -10);
      ctx.quadraticCurveTo(8, -10, 8, -4); ctx.lineTo(8, 12); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = "rgba(10,30,40,0.55)"; ctx.lineWidth = 1; ctx.stroke();
      ctx.fillStyle = "#93A7AE";
      ctx.fillRect(-10, 3, 3, 2.4); ctx.fillRect(7, 3, 3, 2.4);
    } else if (mc.size === "M") {
      ctx.fillStyle = "#93A7AE";
      ctx.fillRect(-1.1, -6 - 16 + rec * 3, 2.2, 16);
      ctx.fillRect(-1.7, -6 - 7 + rec * 3, 3.4, 7);
      ctx.fillStyle = "#647885";
      ctx.beginPath();
      ctx.moveTo(-5.5, 8); ctx.lineTo(-5.5, -2); ctx.lineTo(-3, -6.5);
      ctx.lineTo(3, -6.5); ctx.lineTo(5.5, -2); ctx.lineTo(5.5, 8); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = "rgba(10,30,40,0.55)"; ctx.lineWidth = 1; ctx.stroke();
    } else {
      ctx.strokeStyle = "#7E939C"; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(0, 0, 5.5, 0, TAU); ctx.stroke();
      ctx.fillStyle = "#93A7AE";
      for (const bx of [-1.5, 1.5]) ctx.fillRect(bx - 0.55, -2 - 11 + rec * 2, 1.1, 11);
      ctx.fillStyle = "#647885";
      ctx.beginPath(); ctx.arc(0, 2.2, 2.6, 0, TAU); ctx.fill();
    }
    ctx.restore();
  }
  ctx.restore();
}
function boatTrace() {
  ctx.beginPath();
  ctx.moveTo(0, -16); ctx.quadraticCurveTo(7, -8, 7, 2); ctx.lineTo(6, 14);
  ctx.lineTo(-6, 14); ctx.lineTo(-7, 2); ctx.quadraticCurveTo(-7, -8, 0, -16);
  ctx.closePath();
}
function drawBoats(reduced) {
  const z = cfg.view.zoom;
  for (const b of boats) {
    const [px, py] = w2s(b.x, b.y);
    if (px < -60 || px > W + 60 || py < -60 || py > H + 60) continue;
    const bob = reduced ? 0 : swellH(b.x, b.y, seaT) * cfg.ship.heave_px * 0.8;
    const rock = reduced ? 0 : Math.sin(seaT * 0.9 + b.orbA * 3.1) * 0.05 * cfg.ship.roll_deg;
    const off = cfg.ship.shadow_px * 0.6 * z;
    ctx.save();
    ctx.translate(px + SHADOW.x * off, py + SHADOW.y * off);
    ctx.scale(z, z); ctx.rotate(b.heading + rock);
    boatTrace(); ctx.fillStyle = "rgba(2,10,14,0.35)"; ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.translate(px + SUN.x * bob, py + SUN.y * bob);
    ctx.scale(z, z); ctx.rotate(b.heading + rock);
    boatTrace(); ctx.fillStyle = "#2E3E45"; ctx.fill();
    ctx.strokeStyle = "rgba(228,240,242,0.4)"; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = "#4A5F68"; ctx.fillRect(-3.5, -4, 7, 9);
    ctx.fillStyle = "#93A7AE"; ctx.fillRect(-0.8, -12, 1.6, 8);
    ctx.restore();
  }
}
function drawTracers() {
  const z = cfg.view.zoom;
  for (const p of shells) {
    const [px, py] = w2s(p.x, p.y);
    const [tx, ty] = w2s(p.x - p.vx * 0.03, p.y - p.vy * 0.03);
    if (p.hostile) {
      ctx.strokeStyle = "rgba(233,103,66,0.85)"; ctx.lineWidth = 1.2;
    } else if (p.kind === "mb16") {
      ctx.fillStyle = "rgba(228,240,242,0.95)";
      ctx.beginPath(); ctx.arc(px, py, Math.max(2.6 * z, 1.4), 0, TAU); ctx.fill();
      ctx.strokeStyle = "rgba(228,240,242,0.35)"; ctx.lineWidth = 2;
    } else {
      ctx.strokeStyle = "rgba(228,240,242,0.85)"; ctx.lineWidth = 1.2;
    }
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(px, py); ctx.stroke();
  }
}

/* ════════ WEATHER STATES — the four gate candidates ════════ */
const WX_PRESETS = {
  CLEAR: { name: "CLEAR", voice: "Ceiling unlimited. The strait shows you everything today.",
    wx: { rain: 0, wind: 0.25, veil: 0, bolts: 0, bolt_period: 9 },
    sea: { amp: 0.95, speed: 1.4, streaks: 0.8, heave: 3.0, roll: 2.6 } },
  RAIN: { name: "PASSING RAIN", voice: "Rain on the glass. Radar picture unaffected — eyes degraded.",
    wx: { rain: 0.35, wind: 0.45, veil: 0.16, bolts: 0, bolt_period: 9 },
    sea: { amp: 1.0, speed: 1.45, streaks: 0.85, heave: 3.0, roll: 2.6 } },
  SQUALL: { name: "SQUALL LINE", voice: "Squall line walking up the strait. Green water over the bow.",
    wx: { rain: 0.8, wind: 0.85, veil: 0.36, bolts: 0, bolt_period: 9 },
    sea: { amp: 1.15, speed: 1.7, streaks: 1.0, heave: 3.6, roll: 3.2 } },
  THUNDER: { name: "THUNDERHEAD", voice: "Thunderhead overhead. Count the seconds — the strike already happened.",
    wx: { rain: 0.65, wind: 0.8, veil: 0.4, bolts: 1, bolt_period: 9 },
    sea: { amp: 1.15, speed: 1.7, streaks: 1.0, heave: 3.6, roll: 3.2 } },
};
let wxState = "CLEAR";
function applyWx(id) {
  wxState = id;
  const P = WX_PRESETS[id];
  cfg.wx.rain = P.wx.rain; cfg.wx.wind = P.wx.wind; cfg.wx.veil = P.wx.veil;
  cfg.wx.bolts = P.wx.bolts; cfg.wx.bolt_period = P.wx.bolt_period;
  cfg.swell.amp = P.sea.amp; cfg.swell.speed = P.sea.speed;
  cfg.foam.crest_streaks = P.sea.streaks;
  cfg.ship.heave_px = P.sea.heave; cfg.ship.roll_deg = P.sea.roll;
  document.getElementById("wx-line").textContent = `${P.name} — ${P.voice}`;
  syncPanel();
}

/* ════════ INPUT — loiter autopilot tours the props; WASD overrides ════════ */
const keys = {};
let manualUntil = -1, paused = false;
let reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (k === "p" && !e.repeat) togglePause();
  if ("wasd".includes(k)) { keys[k] = true; manualUntil = simT + 6; }
});
addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });
function readInput() {
  if (simT < manualUntil)
    return { thrust: (keys.w ? 1 : 0) + (keys.s ? -1 : 0), rudder: (keys.d ? 1 : 0) + (keys.a ? -1 : 0) };
  wpA += SIM_DT * 0.045;                                     // the tour: a slow ring past vortex, buoy, wreck
  const wp = { x: Math.sin(wpA) * 430, y: -Math.cos(wpA) * 430 };
  const desired = angleTo(ship, wp);
  return { thrust: ship.along < MOVE.max_speed_ahead * 0.6 ? 1 : 0,
           rudder: clamp(angDiff(desired, ship.heading) * 1.6, -1, 1) };
}
function togglePause() {
  paused = !paused;
  const b = document.getElementById("btn-pause");
  if (b) b.classList.toggle("active", paused);
}

/* ════════ GATE RAIL ════════ */
const SLIDERS = [
  ["Weather", [["wx.rain", "rain density", 0, 1, 0.01], ["wx.wind", "wind", 0, 1, 0.01],
               ["wx.bearing", "wind bearing (deg)", 0, 360, 1], ["wx.veil", "visibility veil", 0, 0.8, 0.01],
               ["wx.bolt_period", "strike period (s)", 4, 20, 0.5]]],
  ["Whirlpool", [["vortex.R", "influence radius (u)", 80, 300, 1], ["vortex.tang", "swirl pull (u/s²)", 0, 80, 1],
                 ["vortex.inward", "inward pull (u/s²)", 0, 30, 0.5], ["vortex.spin", "foam spin", 0, 1.2, 0.01]]],
  ["Sea (approved C9-B)", [["swell.amp", "band strength", 0, 1.6, 0.01], ["swell.speed", "drift speed", 0, 3, 0.01],
             ["glint.intensity", "glint intensity", 0, 1, 0.01], ["foam.crest_streaks", "crest streaks", 0, 1, 0.01]]],
  ["Ship ride", [["ship.heave_px", "heave (px)", 0, 5, 0.1], ["ship.roll_deg", "roll (deg)", 0, 4, 0.1]]],
  ["View", [["view.zoom", "zoom — C10 preview", 0.4, 1.0, 0.01]]],
];
const DET_LABELS = { smoke: "funnel smoke", casings: "shell casings", gulls: "gulls", flotsam: "flotsam",
                     wreck: "wreck slick", spray: "bow spray", lamp: "signal lamp", buoy: "channel buoy" };
function getPath(path) { const [a, b] = path.split("."); return cfg[a][b]; }
function setPath(path, v) { const [a, b] = path.split("."); cfg[a][b] = v; }
function buildPanel() {
  const body = document.getElementById("tuning-body");
  body.style.pointerEvents = "auto";
  let html = `<div style="margin-bottom:6px">`;
  for (const id of Object.keys(WX_PRESETS))
    html += `<button class="kbtn wxbtn" id="wx-${id}">${WX_PRESETS[id].name}</button>`;
  html += `</div><div style="margin-bottom:6px">
    <button class="kbtn" id="btn-vortex">whirlpool</button>
    <button class="kbtn" id="btn-pull">pull</button>
    <button class="kbtn" id="btn-ring">show radius</button></div>`;
  for (const [sect, items] of SLIDERS) {
    html += `<details class="sect" open><summary>${sect}</summary><div class="body">`;
    for (const [path, label, min, max, step] of items)
      html += `<div class="tun"><div class="row"><span class="name">${label}</span>
        <span class="val" id="val-${path.replace(".", "-")}"></span></div>
        <input type="range" id="in-${path.replace(".", "-")}" data-path="${path}"
               min="${min}" max="${max}" step="${step}"></div>`;
    html += `</div></details>`;
  }
  html += `<details class="sect" open><summary>Detail pass — judge each alone</summary><div class="body">`;
  for (const k of Object.keys(DET_LABELS))
    html += `<button class="kbtn detbtn" id="det-${k}">${DET_LABELS[k]}</button>`;
  html += `</div></details>`;
  html += `<div style="margin-top:10px">
    <button class="kbtn" id="btn-reduced">reduced motion</button>
    <button class="kbtn" id="btn-pause">pause</button></div>`;
  body.innerHTML = html;
  body.querySelectorAll("input[type=range]").forEach((el) => {
    el.addEventListener("input", () => { setPath(el.dataset.path, parseFloat(el.value)); updateVals(); });
  });
  for (const id of Object.keys(WX_PRESETS))
    document.getElementById(`wx-${id}`).addEventListener("click", () => applyWx(id));
  document.getElementById("btn-vortex").addEventListener("click", () => { cfg.vortex.on = cfg.vortex.on ? 0 : 1; syncPanel(); });
  document.getElementById("btn-pull").addEventListener("click", () => { cfg.vortex.pull = cfg.vortex.pull ? 0 : 1; syncPanel(); });
  document.getElementById("btn-ring").addEventListener("click", () => { cfg.vortex.ring = cfg.vortex.ring ? 0 : 1; syncPanel(); });
  for (const k of Object.keys(DET_LABELS))
    document.getElementById(`det-${k}`).addEventListener("click", () => { cfg.det[k] = cfg.det[k] ? 0 : 1; syncPanel(); });
  document.getElementById("btn-reduced").addEventListener("click", () => { reducedMotion = !reducedMotion; syncPanel(); });
  document.getElementById("btn-pause").addEventListener("click", togglePause);
}
function updateVals() {
  for (const [, items] of SLIDERS)
    for (const [path] of items) {
      const el = document.getElementById(`val-${path.replace(".", "-")}`);
      if (el) el.textContent = (+getPath(path)).toFixed(2).replace(/\.?0+$/, "") || "0";
    }
}
function syncPanel() {
  for (const [, items] of SLIDERS)
    for (const [path] of items) {
      const el = document.getElementById(`in-${path.replace(".", "-")}`);
      if (el) el.value = getPath(path);
    }
  updateVals();
  for (const id of Object.keys(WX_PRESETS))
    document.getElementById(`wx-${id}`).classList.toggle("active", wxState === id);
  document.getElementById("btn-vortex").classList.toggle("active", !!cfg.vortex.on);
  document.getElementById("btn-pull").classList.toggle("active", !!cfg.vortex.pull);
  document.getElementById("btn-ring").classList.toggle("active", !!cfg.vortex.ring);
  for (const k of Object.keys(DET_LABELS))
    document.getElementById(`det-${k}`).classList.toggle("active", !!cfg.det[k]);
  document.getElementById("btn-reduced").classList.toggle("active", reducedMotion);
}
function updateMet() {
  const P = WX_PRESETS[wxState];
  document.getElementById("met-wx").innerHTML =
    `STATE <b>${P.name}</b> · rain <b>${cfg.wx.rain.toFixed(2)}</b> · wind <b>${cfg.wx.wind.toFixed(2)}</b> @ <b>${Math.round(cfg.wx.bearing)}°</b> · veil <b>${cfg.wx.veil.toFixed(2)}</b>`;
  const d = Math.hypot(ship.x - VORTEX.x, ship.y - VORTEX.y);
  document.getElementById("met-vortex").innerHTML = cfg.vortex.on
    ? `VORTEX <b>${Math.round(d)} u</b> ${d < cfg.vortex.R ? "— <b>IN THE PULL</b>, helm answering" : "off the bow — clear of the pull"}`
    : "VORTEX — charted, disabled on the rail.";
}

/* ════════ MAIN LOOP ════════ */
function render() {
  ctx.fillStyle = "#0A1E28";
  ctx.fillRect(0, 0, W, H);
  drawSwell(seaT);
  drawGrid();
  drawGlints(seaT);
  drawFlecks(seaT, reducedMotion);
  drawStreaks();
  drawVortex(reducedMotion);        // water feature — under everything that floats
  drawWreck(reducedMotion);
  drawDimples();
  drawWake();
  drawSplashWater(reducedMotion);
  drawFlotsam(reducedMotion);
  drawBuoy(reducedMotion);
  drawRipples();
  drawSmoke();
  drawBoats(reducedMotion);
  drawShip(reducedMotion);
  drawCasings();
  drawSpray();
  drawGulls(reducedMotion);
  drawTracers();
  drawSplashPlumes(reducedMotion);
  drawFxAbove();
  drawBolts(reducedMotion);
  drawRain(reducedMotion);          // screen-space — over the world, under the veil
  drawVeil(reducedMotion ? 0 : flash);
}
let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  if (!paused) {
    acc += dt;
    while (acc >= SIM_DT) {
      acc -= SIM_DT;
      simT += SIM_DT;
      if (!reducedMotion) seaT += SIM_DT;
      const inp = readInput();
      stepShip(inp, SIM_DT); stepBoats(SIM_DT); stepMounts(SIM_DT);
      stepShells(SIM_DT); stepEvents(SIM_DT); stepWake(SIM_DT); stepStreaks(SIM_DT, reducedMotion);
      stepDimples(SIM_DT, reducedMotion); stepLightning(SIM_DT, reducedMotion);
      stepDetails(SIM_DT, reducedMotion); stepSpray(SIM_DT, reducedMotion); stepLamp(SIM_DT, reducedMotion);
    }
  }
  cam.x = ship.x; cam.y = ship.y;
  render();
  updateMet();
}
buildPanel();
applyWx("THUNDER");   // boot loud so the gate opens on the full proposal; CLEAR is one click away
syncPanel();
requestAnimationFrame(frame);
</script>
</body>
</html>
