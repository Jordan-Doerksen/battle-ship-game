<!-- ================================================================================
  Earth Defense Force (working title) — C15 THE WATERS · mockup gate
  Forked from design/fire-control.html (the APPROVED C11 reference — untouched).
  The ocean grew teeth: a seeded archipelago of rocks and small islands the ship
  must steer around. Owner directive: ROCKS AND SMALL ISLANDS, per-run, static.
    · TERRAIN — the SEED knob (integer, default 7; retype/± regenerates, REGENERATE
      = next seed) drives its OWN mulberry32 stream — the scene rng never touches
      it, so same seed = same archipelago regardless of the war. 2–4 blobby islets
      (8–12 verts on a wobbled 60–140 u radius) + 8–16 rock/reef features (10–30 u,
      singles and clusters of 2–3) over a ~3000×2200 u field around the origin.
      Rejection sampling: nothing within 250 u of the ship start, 180 u of open
      water between feature edges (the channels). The FIRST islet is staged
      420–650 u out — inside the gun/orbit envelope — so the fire story shows.
    · THE LOOK — per body, coast-out: a pale SHOAL HALO (the sea goes shallow-green
      near land, extent knobbed ~1.5× r) · an animated FOAM FRINGE hugging the
      coastline (splash-disc foam language, slow pulse on the sea clock) · a dark
      basalt gray-brown BODY with a darker heart + facet lines — clearly NOT
      hostile-red, NOT ship-steel. Islets carry 1–2 deadpan props: a scrubby bush,
      a lone navigation light on a slow blink. Min-px art floors so it reads at 0.4.
    · COLLISION — the hull (capsule, half-length 97 × radius 30 at the C14 scale)
      SLIDES off terrain: velocity projected off the contact normal, gentle push-out,
      churned foam + speed loss on the grind. No damage here — open gate question.
      Gunboats give way (tangent avoidance, 200 u lookahead); swarmers are air and
      cross everything; nothing spawns inside terrain.
    · FIRE — mb16 splash shells ARC OVER terrain (ballistic, unchanged; a burst that
      comes down ON land throws gray rock dust, not a water column). FLAT fire —
      gunboat dp5 at the player, own dp5 direct rounds — TERMINATES on rock with a
      gray puff. TORPEDOES die on rock with a full splash column, and the runner's
      line is scripted to cross a rock half the time. Islands are cover both ways.
    · SCOPE — terrain painted on the mini radar as dim solid brass-gray land-masses,
      unmistakably not blips.
    · C14 PARITY — hull art scale 2.4 → 2.75: the deck art is hand-tuned at 2.4, so
      every hull-local transform rides HULL_ART = 2.75/2.4 (outline, deck, mounts,
      bow wave, wake anchors, muzzle reach) — one multiplier, uniform growth.
  Sea locked to C9 · camera to C10 · fire control to C11. Only the rocks are on trial.
  Keys: WASD steer the channel · hold RMB main battery · wheel zoom · H home · P pause.
================================================================================= -->

<script>
"use strict";
/* ════════════════════════════ CONFIG — every knob the panel exposes ════════════════════════════
   The sea domains map 1:1 onto the planned config/field.tres additions (C9, locked); `zoom`
   is the approved C10 table (CameraConfig.tres); `fire` is the approved C11 table. NEW here:
   the `terrain` domain — the C15 waters tables headed for a TerrainConfig.tres. */
const DEFAULT_CFG = {
  swell:  { amp: 0.55, speed: 1.0, scale: 1.0 },   // band opacity mult · drift mult · spatial mult
  glint:  { intensity: 0.5 },                       // 0 = today's dead sea
  foam:   { density: 130, crest_bias: 0.6, crest_streaks: 0.0 },   // fleck count · crest cling · breaking streaks (direction B)
  ship:   { heave_px: 1.4, roll_deg: 1.0, shadow_px: 3.5 },   // render-only; sim never sees these
  splash: { scale: 1.0, foam_life: 4.0, dye: false },         // dye = per-battery rim tint (WWII spotting)
  wake:   { life: 7.0, width: 1.0 },
  // C10 tables: wheel bounds · home view (owner's judged 0.51) · wheel multiplier per notch ·
  // lerp half-life (s) · min-apparent-size floor in screen px (0 disables)
  zoom:   { min: 0.40, max: 0.85, home: 0.51, wheel_step: 1.18, half_life: 0.12, min_px: 10 },
  // C11 tables: RANGEKEEPER snap radius (world u, contact-nearest-cursor gate) · scope
  // burst-flash life (s) · flight-time readout toggle · RANGEKEEPER advisory toggle
  // (default ON for the demo — in the game it's a tech-tree unlock)
  fire:   { snap_radius: 120, flash_life: 1.2, show_time: true, rangekeeper: true },
  // C15 tables: THE WATERS — `seed` feeds a DEDICATED mulberry32 stream (the scene rng never
  // touches it); islets/rocks/size regenerate the field on change; shoal/fringe are draw-time
  terrain: { seed: 7, islets: 3, rocks: 9, size: 1.35, shoal: 1.54, fringe: 1.0 },   // islets 3 · rocks 9 · size 1.35 · shoal 1.54 = the owner's gate tunes (2026-07-10)
  view:   { zoom: 0.51 },                           // ANIMATED camera zoom — chases targetZoom each frame
};
let cfg = structuredClone(DEFAULT_CFG);
const MOVE = {   // C1 movement, owner-approved — unchanged
  max_speed_ahead: 220.0, astern_frac: 0.35, thrust_accel: 55.0, brake_accel: 90.0,
  drag_forward: 0.08, drag_lateral: 1.8, turn_rate_max: 0.55, turn_speed_floor: 0.25,
};
const SIM_DT = 1 / 60, TAU = Math.PI * 2;
const SUN = { x: -0.55, y: -0.835 };                 // light from upper-left…
const SHADOW = { x: 0.55, y: 0.835 };                // …shadows fall lower-right

/* ════════════════════════════ UTIL ════════════════════════════ */
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rng = mulberry32(0xC9A1);                      // scene randomness (seeded, in-language)
function mod(a, n) { return ((a % n) + n) % n; }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function sstep(e0, e1, x) { const t = clamp((x - e0) / (e1 - e0), 0, 1); return t * t * (3 - 2 * t); }
function easeOutBack(k) { const c = 1.70158, x = k - 1; return 1 + (c + 1) * x * x * x + c * x * x; }
function dirOf(a) { return { x: Math.sin(a), y: -Math.cos(a) }; }   // heading space: 0 = north
function angleTo(from, to) { return Math.atan2(to.x - from.x, -(to.y - from.y)); }
function angDiff(a, b) { return ((a - b + Math.PI) % TAU + TAU) % TAU - Math.PI; }
function hash2(x, y) { const s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453; return s - Math.floor(s); }
function vnoise(x, y) {   // smoothed value noise — the glint fields sample this
  const xi = Math.floor(x), yi = Math.floor(y), xf = x - xi, yf = y - yi;
  const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
  return hash2(xi, yi) * (1 - u) * (1 - v) + hash2(xi + 1, yi) * u * (1 - v)
       + hash2(xi, yi + 1) * (1 - u) * v + hash2(xi + 1, yi + 1) * u * v;
}

/* ════════════════════════════ C15 — THE WATERS · seeded terrain ════════════════════════════
   The heart of the gate. generateTerrain() draws from its OWN mulberry32(seed) stream — the
   scene rng (0xC9A1) never feeds it, so the same seed always lays the same archipelago no
   matter what the war is doing. 2–4 blobby islets (8–12 verts on a wobbled 60–140 u radius)
   + 8–16 rock/reef features (10–30 u, singles and clusters of 2–3) over a ~3000×2200 u field
   around the origin. Rejection sampling: nothing within 250 u of the ship start, 180 u of
   open water between feature EDGES (those gaps are the channels the hint is about). The
   FIRST islet is staged 420–650 u out — inside the gun/orbit envelope — so the fire story
   (boats duelling through an islet, shells eating rock) shows without hunting for it.
   Sim truth = per-BODY circles at the mean coast radius (the polygons are art); the
   feature-level bounding circle serves the broad phase and the helmsmen's avoidance.
   Static: terrain never moves, never despawns. */
let TERRAIN = [];   // [{ kind, x, y, r:bounding, polys:[{x,y,r:mean,maxR,pts,facets}], props, ph }]
function generateTerrain() {
  const tr = mulberry32((cfg.terrain.seed | 0) >>> 0);   // the terrain stream — nothing else draws here
  const S = cfg.terrain.size, HW = 1500, HH = 1100;
  const feats = [];
  const fits = (x, y, r) => {
    if (Math.hypot(x, y) - r < 250) return false;        // the ship-start exclusion
    for (const f of feats)
      if (Math.hypot(x - f.x, y - f.y) - r - f.r < 180) return false;   // edge gap = the channel
    return true;
  };
  const place = (r, ringLo, ringHi) => {                 // rejection sampling — deterministic order
    for (let i = 0; i < 90; i++) {
      let x, y;
      if (ringLo !== undefined) {
        const a = tr() * TAU, d = ringLo + tr() * (ringHi - ringLo);
        x = Math.sin(a) * d; y = -Math.cos(a) * d;
      } else { x = (tr() * 2 - 1) * HW; y = (tr() * 2 - 1) * HH; }
      if (Math.abs(x) > HW || Math.abs(y) > HH) continue;
      if (fits(x, y, r)) return { x, y };
    }
    return null;                                          // crowded seed — feature skipped, still deterministic
  };
  const blob = (cx, cy, R, nLo, nHi) => {                 // wobbled-radius polygon + relief facets
    const n = nLo + Math.floor(tr() * (nHi - nLo + 1));
    const pts = []; let mean = 0, maxR = 0;
    for (let k = 0; k < n; k++) {
      const a = (k / n) * TAU + (tr() - 0.5) * (TAU / n) * 0.6;
      const rad = R * (0.72 + 0.42 * tr());
      mean += rad; maxR = Math.max(maxR, rad);
      pts.push([cx + Math.sin(a) * rad, cy - Math.cos(a) * rad]);
    }
    const facets = [];                                    // darker relief lines, coast toward heart
    const nf = 2 + Math.floor(tr() * 2);
    for (let k = 0; k < nf; k++) {
      const p0 = pts[Math.floor(tr() * n)];
      const ia = tr() * TAU, id = R * (0.10 + 0.30 * tr());
      facets.push([cx + (p0[0] - cx) * 0.82, cy + (p0[1] - cy) * 0.82,
                   cx + Math.sin(ia) * id, cy - Math.cos(ia) * id]);
    }
    return { x: cx, y: cy, r: mean / n, maxR, pts, facets };
  };
  // islets — 2–4, the first staged inside the engagement envelope
  const nIslet = Math.round(cfg.terrain.islets);
  for (let i = 0; i < nIslet; i++) {
    const R = (60 + tr() * 80) * S;
    const pos = i === 0 ? place(R, 420, 650) : place(R);
    if (!pos) continue;
    const body = blob(pos.x, pos.y, R, 8, 12);
    const props = [];
    const np = 1 + (tr() < 0.5 ? 1 : 0);                  // 1–2 deadpan props per islet
    for (let k = 0; k < np; k++) {
      const type = tr() < 0.55 ? "bush" : "light";
      const a = tr() * TAU, d = body.r * (0.28 + 0.32 * tr());
      const offs = [];                                    // bush dot scatter, fixed at gen time
      for (let j = 0; j < 4; j++) offs.push([(tr() * 2 - 1) * 6, (tr() * 2 - 1) * 6]);
      props.push({ type, x: pos.x + Math.sin(a) * d, y: pos.y - Math.cos(a) * d, ph: tr() * TAU, offs });
    }
    feats.push({ kind: "islet", x: pos.x, y: pos.y, r: body.maxR, polys: [body], props, ph: tr() * TAU });
  }
  // rocks/reefs — 8–16 features, singles and clusters of 2–3
  const nRock = Math.round(cfg.terrain.rocks);
  for (let i = 0; i < nRock; i++) {
    const nSub = tr() < 0.55 ? 1 : (tr() < 0.6 ? 2 : 3);
    const r0 = (10 + tr() * 20) * S;
    const pos = place(nSub === 1 ? r0 * 1.2 : r0 * 2.6);
    if (!pos) continue;
    const polys = [blob(pos.x, pos.y, r0, 5, 8)];
    for (let j = 1; j < nSub; j++) {
      const rj = (10 + tr() * 20) * S;
      const a = tr() * TAU, d = (polys[0].maxR + rj) * (0.85 + 0.5 * tr());
      polys.push(blob(pos.x + Math.sin(a) * d, pos.y - Math.cos(a) * d, rj, 5, 8));
    }
    let bound = 0;
    for (const B of polys) bound = Math.max(bound, Math.hypot(B.x - pos.x, B.y - pos.y) + B.maxR);
    feats.push({ kind: "rock", x: pos.x, y: pos.y, r: bound, polys, props: [], ph: tr() * TAU });
  }
  TERRAIN = feats;
}
// ── sim queries ── per-BODY circles are the collision truth; feature circles are broad phase
function terrainBodyAt(x, y, pad = 0) {
  for (const F of TERRAIN) {
    if (Math.hypot(x - F.x, y - F.y) > F.r + pad + 4) continue;
    for (const B of F.polys)
      if (Math.hypot(x - B.x, y - B.y) <= B.r + pad) return B;
  }
  return null;
}
/* Tangent avoidance — shared by the gunboats (200 u lookahead) and the autopilot. If the
   forward ray passes within (bounding r + clearance) of a feature inside the lookahead,
   answer the heading that grazes the tangent; null = channel clear. The tangent SIDE is
   STICKY per agent (stored on the agent object): with a feature dead ahead the raw side
   flips sign every frame, the two turn orders cancel, and the helmsman motors straight
   into the rock and parks — the headless probe caught boats stalled 40 s at a time. */
function avoidHeading(x, y, heading, look, clear, agent) {
  const d = dirOf(heading);
  let hit = null, ht = Infinity;
  for (const F of TERRAIN) {
    const rx = F.x - x, ry = F.y - y;
    const t = rx * d.x + ry * d.y;
    const rr = F.r + clear;
    if (t < -rr || t - rr > look) continue;
    const miss = Math.hypot(rx - d.x * t, ry - d.y * t);
    if (miss >= rr) continue;
    if (t < ht) { ht = t; hit = { F, rr, side: (d.x * ry - d.y * rx) >= 0 ? -1 : 1 }; }
  }
  if (!hit) { if (agent) agent.avF = null; return null; }
  let side = hit.side;
  if (agent) {
    if (agent.avF === hit.F) side = agent.avSide;   // committed — keep rounding the same way
    else { agent.avF = hit.F; agent.avSide = side; }
  }
  const dc = Math.hypot(hit.F.x - x, hit.F.y - y);
  /* Outside the clearance ring: graze the tangent. INSIDE it, a capped asin points slightly
     inward and becomes a stable limit cycle — the probe caught a gunboat doing donuts around
     an islet forever while the ship sailed off. Inside, steer OUTWARD-tangential (>90°) so
     the helmsman spirals back out of the ring, then the normal tangent takes over. */
  const off = dc >= hit.rr
    ? Math.asin(Math.min(1, hit.rr / dc))
    : (Math.PI / 2) * (2 - dc / hit.rr);
  return angleTo({ x, y }, hit.F) + side * off;
}
/* Player hull vs terrain — capsule (half-length 97 × radius 30, the C14 hull) against body
   circles. Sliding response: gentle push-out along the contact normal, the into-rock velocity
   component killed (she slides along the coast), speed bled while grinding, churned foam at
   the waterline. NO damage in this mockup — whether grounding costs hull is a gate question. */
const SHIP_CAPS = { half: 97, r: 30 };
let nextGrind = 0;
function collideShip(dt) {
  const f = dirOf(ship.heading);
  for (const F of TERRAIN) {
    if (Math.hypot(F.x - ship.x, F.y - ship.y) > F.r + SHIP_CAPS.half + SHIP_CAPS.r + 24) continue;
    for (const B of F.polys) {
      const t = clamp((B.x - ship.x) * f.x + (B.y - ship.y) * f.y, -SHIP_CAPS.half, SHIP_CAPS.half);
      const px = ship.x + f.x * t, py = ship.y + f.y * t;
      let dx = px - B.x, dy = py - B.y, d = Math.hypot(dx, dy);
      if (d < 1e-4) { dx = 1; dy = 0; d = 1; }
      const pen = SHIP_CAPS.r + B.r - d;
      if (pen <= 0) continue;
      const nx = dx / d, ny = dy / d;                    // contact normal, off the rock
      ship.x += nx * pen; ship.y += ny * pen;            // gentle push-out (a few u/frame at most)
      const vn = ship.vx * nx + ship.vy * ny;
      if (vn < 0) { ship.vx -= nx * vn; ship.vy -= ny * vn; }   // slide: kill the into-rock component
      ship.vx *= 1 - 0.55 * dt; ship.vy *= 1 - 0.55 * dt;       // the grind — she loses way on the rocks
      if (simT >= nextGrind) {                           // churned foam at the contact point
        nextGrind = simT + 0.13;
        spawnSplash(B.x + nx * B.r, B.y + ny * B.r, "gun", false);
      }
    }
  }
}
function initBoats() {   // C15 — boats integrate velocity now; start them ON orbit, clear of the rocks
  for (const b of boats) {
    b.x = ship.x + Math.sin(b.orbA) * b.orbR;
    b.y = ship.y - Math.cos(b.orbA) * b.orbR;
    b.heading = b.orbA + b.dir * Math.PI / 2;
    const B = terrainBodyAt(b.x, b.y, 40);
    if (B) {   // nothing spawns inside terrain — shove the boat to open water
      const dx = b.x - B.x, dy = b.y - B.y, dd = Math.max(1e-3, Math.hypot(dx, dy));
      b.x = B.x + dx / dd * (B.r + 44); b.y = B.y + dy / dd * (B.r + 44);
    }
  }
}

/* ════════════════════════════ CANVAS / CAMERA ════════════════════════════ */
const canvas = document.getElementById("sea");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
addEventListener("resize", resize);
resize();
const cam = { x: 0, y: 0 };
let targetZoom = 0.51;   // the wheel drives THIS; cfg.view.zoom chases it (boots at the judged home view)
let compOn = true;       // C10 gate decision — stroke compensation, default ON
function w2s(wx, wy) { const z = cfg.view.zoom; return [(wx - cam.x) * z + W / 2, (wy - cam.y) * z + H / 2]; }
// STROKE COMPENSATION — world-art line widths widen as the camera pulls back so outlines hold
// apparent width instead of thinning to fuzz. Factor 1 at zoom ≥ 0.85 (the C9 view is untouched),
// capped ×2.2 so nothing turns to marker. Chart grid / HUD / fills stay OUT of it on purpose.
function lw(w) { return compOn ? w * Math.min(2.2, Math.max(1, 0.85 / cfg.view.zoom)) : w; }
// high-frequency layers fade as the zoom pulls back — keyed to the wheel TARGET, not the animated
// value, so the fade commits once per wheel stop instead of shimmering through every mid-lerp frame
function hfFade() { return sstep(0.42, 0.75, targetZoom); }

/* ════════════════════════════ LAYER 1+2 — SWELL BANDS ════════════════════════════
   Two pre-rendered seamless tiles (sums of integer-wavevector sines → wrap cleanly),
   drawn as repeating patterns scrolled at different scales/speeds. Barely-there value
   shifts on the deep base: crests lift toward a cool lit sea, troughs sink darker. */
const TILE = 512;
function buildBandTile(waves, lightA, darkA) {
  const c = document.createElement("canvas"); c.width = c.height = TILE;
  const g = c.getContext("2d");
  const img = g.createImageData(TILE, TILE), d = img.data;
  for (let y = 0; y < TILE; y++) {
    for (let x = 0; x < TILE; x++) {
      let h = 0;
      for (const [nx, ny, amp, ph] of waves) h += amp * Math.sin(TAU * (nx * x + ny * y) / TILE + ph);
      const i = (y * TILE + x) * 4;
      if (h > 0) { d[i] = 62; d[i + 1] = 112; d[i + 2] = 128; d[i + 3] = Math.round(sstep(0.18, 0.95, h) * lightA * 255); }
      else       { d[i] = 3;  d[i + 1] = 10;  d[i + 2] = 15;  d[i + 3] = Math.round(sstep(0.18, 0.95, -h) * darkA * 255); }
    }
  }
  g.putImageData(img, 0, 0);
  return ctx.createPattern(c, "repeat");
}
const BAND_LAYERS = [
  // broad diagonal swell — the long newsreel roll. scale: tile spans ~1180 world units.
  { pat: buildBandTile([[2, 1, 0.55, 0.7], [1, 2, 0.30, 2.9], [3, -1, 0.15, 5.1]], 0.16, 0.20),
    scale: 2.3, alpha: 1.0, dx: 8.5, dy: 8.5, hf: false },
  // finer counter-diagonal chop riding on top — fades with zoom (high-frequency layer)
  { pat: buildBandTile([[4, 3, 0.50, 1.3], [3, -4, 0.30, 4.0], [6, 2, 0.20, 0.5]], 0.10, 0.12),
    scale: 1.15, alpha: 0.8, dx: -10, dy: 14, hf: true },
];
function drawSwell(seaT) {
  const z = cfg.view.zoom, fade = hfFade();
  for (const L of BAND_LAYERS) {
    const s = z * cfg.swell.scale * L.scale, per = TILE * s;
    const ox = mod(W / 2 - cam.x * z + L.dx * seaT * cfg.swell.speed * z, per);
    const oy = mod(H / 2 - cam.y * z + L.dy * seaT * cfg.swell.speed * z, per);
    ctx.save();
    ctx.globalAlpha = cfg.swell.amp * L.alpha * (L.hf ? 0.35 + 0.65 * fade : 1);
    ctx.translate(ox - per, oy - per);
    ctx.scale(s, s);
    ctx.fillStyle = L.pat;
    ctx.fillRect(0, 0, (W + 2 * per) / s, (H + 2 * per) / s);
    ctx.restore();
  }
}
// Analytic swell height (−1…1) for heave/roll + crest-biased foam. Shares direction and
// tempo with the band tiles, not exact phase — at these amplitudes nothing visibly disagrees,
// and the Godot shader gets one function driving both anyway.
function swellH(wx, wy, seaT) {
  const k = 0.0035 / Math.max(0.2, cfg.swell.scale), sp = cfg.swell.speed;
  return 0.6 * Math.sin((wx * 0.71 + wy * 0.71) * k + seaT * 0.25 * sp)
       + 0.4 * Math.sin((wx * 0.44 - wy * 0.90) * k * 1.9 - seaT * 0.37 * sp);
}

/* ════════════════════════════ LAYER 3 — CHART GRID (unchanged language) ════════════════════════════
   Screen-space 1 px by design — charts don't thicken when you pull back. NOT routed through lw(). */
function drawGrid() {
  const z = cfg.view.zoom;
  for (const [step, a] of [[200, 0.035], [1000, 0.07]]) {
    ctx.strokeStyle = `rgba(228,240,242,${a})`; ctx.lineWidth = 1; ctx.beginPath();
    const wx0 = cam.x - (W / 2) / z, wy0 = cam.y - (H / 2) / z;
    for (let gx = Math.floor(wx0 / step) * step; ; gx += step) {
      const px = (gx - cam.x) * z + W / 2; if (px > W) break;
      ctx.moveTo(px, 0); ctx.lineTo(px, H);
    }
    for (let gy = Math.floor(wy0 / step) * step; ; gy += step) {
      const py = (gy - cam.y) * z + H / 2; if (py > H) break;
      ctx.moveTo(0, py); ctx.lineTo(W, py);
    }
    ctx.stroke();
  }
}

/* ════════════════════════════ LAYER 4 — GLINT FIELD ════════════════════════════
   Two counter-scrolling noise fields multiplied, smoothstep-thresholded — evaluated at a
   world-anchored jittered point grid (the cheap point-sampled equivalent of the shader's
   full-field multiply). Soft foam-colored flecks of light, never hard sparkle. */
function drawGlints(seaT) {
  const inten = cfg.glint.intensity * hfFade();
  if (inten <= 0.02) return;
  const z = cfg.view.zoom;
  const cell = Math.max(24, Math.round(42 / z));     // world units per candidate point
  const wx0 = cam.x - (W / 2) / z, wy0 = cam.y - (H / 2) / z;
  const wx1 = cam.x + (W / 2) / z, wy1 = cam.y + (H / 2) / z;
  ctx.fillStyle = "rgba(228,240,242,1)";
  for (let gy = Math.floor(wy0 / cell); gy * cell < wy1 + cell; gy++) {
    for (let gx = Math.floor(wx0 / cell); gx * cell < wx1 + cell; gx++) {
      const jx = hash2(gx, gy), jy = hash2(gx + 57.3, gy - 11.9);
      const px = (gx + jx) * cell, py = (gy + jy) * cell;
      const n1 = vnoise(px * 0.012 + seaT * 0.55, py * 0.012 + seaT * 0.40);
      const n2 = vnoise(px * 0.017 - seaT * 0.45, py * 0.017 + seaT * 0.35);
      const m = sstep(0.42, 0.58, n1 * n2);
      if (m <= 0.03) continue;
      const [sx, sy] = w2s(px, py);
      ctx.globalAlpha = m * 0.5 * inten;
      ctx.fillRect(sx - 1.5, sy - 0.5, 3, 1);        // tiny horizontal light-catch, fleck language
    }
  }
  ctx.globalAlpha = 1;
}

/* ════════════════════════════ LAYER 5 — CREST-BIASED FOAM FLECKS ════════════════════════════ */
const FLECK_TILE = 1600, FLECK_MAX = 260, FLECKS = [];
for (let i = 0; i < FLECK_MAX; i++)
  FLECKS.push({ x: rng() * FLECK_TILE, y: rng() * FLECK_TILE, len: 3 + rng() * 9, ph: rng() * TAU });
function drawFlecks(seaT, reduced) {
  const z = cfg.view.zoom, fade = 0.45 + 0.55 * hfFade();
  const n = Math.min(FLECK_MAX, Math.round(cfg.foam.density));
  const bias = cfg.foam.crest_bias;
  for (let i = 0; i < n; i++) {
    const f = FLECKS[i];
    const wx = mod(f.x - cam.x + FLECK_TILE / 2, FLECK_TILE) - FLECK_TILE / 2 + cam.x;
    const wy = mod(f.y - cam.y + FLECK_TILE / 2, FLECK_TILE) - FLECK_TILE / 2 + cam.y;
    const [px, py] = w2s(wx, wy);
    if (px < -20 || px > W + 20 || py < -20 || py > H + 20) continue;
    const crest = sstep(0.1, 0.9, (swellH(wx, wy, seaT) + 1) / 2);
    const a = 0.16 * (1 - bias * 0.65 + bias * 1.3 * crest) * fade;
    if (a <= 0.01) continue;
    const bob = reduced ? 0 : Math.sin(seaT * 0.6 + f.ph) * 1.5;
    const len = f.len * (0.8 + 0.5 * crest) * z;
    ctx.strokeStyle = `rgba(228,240,242,${a.toFixed(3)})`;
    ctx.lineWidth = 1; ctx.beginPath();
    ctx.moveTo(px - len / 2, py + bob * z); ctx.lineTo(px + len / 2, py + bob * z);
    ctx.stroke();
  }
}
/* ════════════════════════════ SCENE SIM — cosmetic demo, seeded ════════════════════════════
   Just enough war to judge the camera: the ship steams (autopilot or WASD), two gunboats
   orbit and straddle her with near-misses, the main battery answers, door guns stitch,
   depth charges roll, one torpedo runs past, four swarmers circle. Look mockup — no damage model. */
let simT = 0, seaT = 0;
const ship = { x: 0, y: 0, vx: 0, vy: 0, heading: 0, along: 0 };
function stepShip(inp, dt) {                        // C1 model, unchanged
  const speed = Math.hypot(ship.vx, ship.vy);
  const auth = Math.max(MOVE.turn_speed_floor, Math.min(1, speed / MOVE.max_speed_ahead));
  ship.heading += MOVE.turn_rate_max * auth * inp.rudder * dt;
  const f = dirOf(ship.heading), r = { x: -f.y, y: f.x };
  let along = ship.vx * f.x + ship.vy * f.y;
  let lat = ship.vx * r.x + ship.vy * r.y;
  if (inp.thrust !== 0) {
    const opposing = (inp.thrust > 0 && along < -0.01) || (inp.thrust < 0 && along > 0.01);
    along += (opposing ? MOVE.brake_accel : MOVE.thrust_accel) * inp.thrust * dt;
  }
  along *= Math.exp(-MOVE.drag_forward * dt);
  lat *= Math.exp(-MOVE.drag_lateral * dt);
  along = Math.min(MOVE.max_speed_ahead, Math.max(-MOVE.max_speed_ahead * MOVE.astern_frac, along));
  ship.vx = f.x * along + r.x * lat; ship.vy = f.y * along + r.y * lat;
  ship.x += ship.vx * dt; ship.y += ship.vy * dt;
  ship.along = along;
}

const boats = [
  { orbA: 0.4, orbR: 380, dir: 1, x: 0, y: 0, vx: 0, vy: 0, heading: 0, cool: 3.0 },
  { orbA: 3.6, orbR: 430, dir: -1, x: 0, y: 0, vx: 0, vy: 0, heading: 0, cool: 4.4 },
];
function stepBoats(dt) {
  for (const b of boats) {
    const spd = 55;
    b.orbA += (spd / b.orbR) * b.dir * dt;
    b.orbR = (b === boats[0] ? 380 : 430) + Math.sin(simT * 0.13 + b.orbA) * 45;
    const nx = ship.x + Math.sin(b.orbA) * b.orbR, ny = ship.y - Math.cos(b.orbA) * b.orbR;
    /* C15 — gunboats are surface craft now: they steer (turn-rate helm) FOR the orbit point
       and give way around terrain (tangent avoidance, 200 u lookahead) instead of teleporting
       along the orbit. Station-keeping on a moving carrier: their speed rides ON TOP of the
       ship's own speed (the old glued-orbit boats implicitly did this), plus a chase term
       when a detour leaves them behind the sweep — so they always regain station, then
       settle back to the 55 u/s prowl. */
    const chase = Math.hypot(nx - b.x, ny - b.y);
    let want = angleTo(b, { x: nx, y: ny });
    const av = avoidHeading(b.x, b.y, b.heading, 200, 34, b);
    if (av !== null) want = av;
    b.heading += clamp(angDiff(want, b.heading), -2.2 * dt, 2.2 * dt);
    const v = Math.min(Math.hypot(ship.vx, ship.vy) + spd * clamp(chase / 120, 0.8, 3.0), 340);
    const dh = dirOf(b.heading);
    b.vx = dh.x * v; b.vy = dh.y * v;                 // real velocity — RANGEKEEPER reads this
    b.x += b.vx * dt; b.y += b.vy * dt;
    const B = terrainBodyAt(b.x, b.y, 14);            // hard safety: never park a boat inside a rock
    if (B) {
      const dx = b.x - B.x, dy = b.y - B.y, dd = Math.max(1e-3, Math.hypot(dx, dy));
      b.x = B.x + dx / dd * (B.r + 14); b.y = B.y + dy / dd * (B.r + 14);
    }
    b.cool -= dt;
    if (b.cool <= 0) {                              // straddle the ship — near-misses matter
      b.cool = 4.2 + rng() * 2.0;                   // C11: slowed from 2.4+ so the player's salvos read
      const tof = Math.hypot(ship.x - b.x, ship.y - b.y) / 620;
      const aim = { x: ship.x + ship.vx * tof * 0.7 + (rng() * 2 - 1) * 60,
                    y: ship.y + ship.vy * tof * 0.7 + (rng() * 2 - 1) * 60 };
      const ang = angleTo(b, aim), d = dirOf(ang);
      const dist = Math.hypot(aim.x - b.x, aim.y - b.y);
      shells.push({ x: b.x, y: b.y, vx: d.x * 620, vy: d.y * 620, life: dist / 620, hostile: true, kind: "dp5" });
      fxAbove.push({ type: "gunflash", x: b.x + d.x * 14, y: b.y + d.y * 14, t0: simT });
    }
  }
}

/* ════════════════════════════ SWARMERS — the min-size floor's test subjects ════════════════════════════
   Four hostile deltas, ~12 world units — the smallest actor class the game will field. They orbit
   the ship fast (different radii, phases, directions, slight wobble) so the eye has to track them
   at every zoom. Their draw applies the MIN-APPARENT-SIZE FLOOR: boost = max(1, minPx / (len·zoom)),
   rendered at scale(zoom·boost) so they never fall below minPx apparent pixels. Slider to 0 = off.
   Cosmetic demo — no contact, no damage; they exist to be judged at 0.4.
   C15: swarmers (and bombers, when they come) are AIR — they cross terrain freely, no avoidance. */
const SWARMER_LEN = 12, BOAT_LEN = 28;
const swarmers = [
  { ang: 0.7, r0: 250, dir: 1,  spd: 96, wob: 0.9, x: 0, y: 0, vx: 0, vy: 0, heading: 0 },
  { ang: 2.4, r0: 310, dir: -1, spd: 88, wob: 1.3, x: 0, y: 0, vx: 0, vy: 0, heading: 0 },
  { ang: 4.1, r0: 365, dir: 1,  spd: 92, wob: 0.7, x: 0, y: 0, vx: 0, vy: 0, heading: 0 },
  { ang: 5.6, r0: 420, dir: -1, spd: 84, wob: 1.1, x: 0, y: 0, vx: 0, vy: 0, heading: 0 },
];
function stepSwarmers(dt) {
  for (const s of swarmers) {
    const r = s.r0 + Math.sin(simT * 0.5 * s.wob + s.ang * 1.7) * 26;   // slight radial wobble
    s.ang += (s.spd / r) * s.dir * dt;
    const nx = ship.x + Math.sin(s.ang) * r, ny = ship.y - Math.cos(s.ang) * r;
    s.vx = (nx - s.x) / dt; s.vy = (ny - s.y) / dt;   // C11: RANGEKEEPER reads contact velocity
    s.x = nx;
    s.y = ny;
    s.heading = s.ang + s.dir * Math.PI / 2 + Math.sin(simT * 1.8 + s.ang) * 0.08;   // tangent + wiggle
  }
}
function drawSwarmers() {
  const z = cfg.view.zoom;
  const boost = Math.max(1, cfg.zoom.min_px / Math.max(0.001, SWARMER_LEN * z));   // THE FLOOR
  for (const s of swarmers) {
    const [px, py] = w2s(s.x, s.y);
    if (px < -40 || px > W + 40 || py < -40 || py > H + 40) continue;
    ctx.save();
    ctx.translate(px, py); ctx.scale(z * boost, z * boost); ctx.rotate(s.heading);
    ctx.fillStyle = "rgba(228,240,242,0.45)";                          // tiny foam dot at the tail
    ctx.beginPath(); ctx.arc(0, 7.6, 1.5, 0, TAU); ctx.fill();
    ctx.fillStyle = "#D94F2B";                                         // the game's hostile delta
    ctx.beginPath();
    ctx.moveTo(0, -7); ctx.lineTo(5, 5); ctx.lineTo(0, 2.6); ctx.lineTo(-5, 5);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

// player mounts — the C2 art, aimed by a slim slew loop (mockup: gunboats are the only targets)
const MOUNTS = [
  { x: 0, y: -72, size: "L" }, { x: 0, y: 36, size: "L" },
  { x: -19, y: -28, size: "M" }, { x: 19, y: -28, size: "M" },
  { x: -19, y: 14, size: "M" }, { x: 19, y: 14, size: "M" },
  { x: -16, y: -55, size: "S" }, { x: 16, y: -55, size: "S" },
  { x: -17, y: 52, size: "S" }, { x: 17, y: 52, size: "S" },
];
const GUN = {   // C2 weapons, rates eased so splash cadence reads (mockup pacing, not balance)
  L: { rate: 0.31, traverse: 0.9, speed: 420, range: 900, spread: 0.012, splash: "mb16", active: true },
  M: { rate: 0.5, traverse: 2.2, speed: 620, range: 560, spread: 0.05, splash: "dp5", active: true },
  S: { rate: 0, traverse: 4.0, speed: 700, range: 420, spread: 0.045, splash: "gun", active: false }, // no air targets — AA stows
};
const mounts = MOUNTS.map(() => ({ ang: 0, cool: 0 }));
const RECOIL = MOUNTS.map(() => 0);
const FLASH_LEN = { L: 35, M: 22, S: 13 };
function mountWorld(mc) {
  const c = Math.cos(ship.heading), s = Math.sin(ship.heading);
  const ax = mc.x * HULL_ART, ay = mc.y * HULL_ART;   // C14: mount offsets ride the hull scale
  return { x: ship.x + ax * c - ay * s, y: ship.y + ax * s + ay * c };
}
function stepMounts(dt) {
  const cw = cursorWorld();
  for (let i = 0; i < MOUNTS.length; i++) {
    const mc = MOUNTS[i], m = mounts[i], w = GUN[mc.size];
    const mp = mountWorld(mc);
    if (mc.size === "L") {
      /* C11 — the main battery answers to the cursor and nothing else in this mockup.
         Hold RMB: slew onto the cursor bearing, fire on the C11 rule. Released: no auto
         targeting — the turrets stow on the bow (the gate is manual fire control). */
      const desired = rmbHeld ? angleTo(mp, cw) : ship.heading;
      m.ang += clamp(angDiff(desired, m.ang), -w.traverse * dt, w.traverse * dt);
      m.cool -= dt;
      if (rmbHeld && m.cool <= 0 && Math.abs(angDiff(desired, m.ang)) <= 0.06) {
        m.cool = 1 / w.rate;
        const cdist = Math.hypot(cw.x - mp.x, cw.y - mp.y);
        // THE C11 RULE: cursor in range → the shell's flight ends AT the cursor point
        // (life = dist/speed) and bursts there. Beyond range → full 900 along the
        // cursor bearing, burst at the end (today's rule). Prox-fuse splash unchanged.
        const dist = Math.min(cdist, w.range);
        const d = dirOf(m.ang + (rng() * 2 - 1) * w.spread);
        shells.push({ x: mp.x, y: mp.y, vx: d.x * w.speed, vy: d.y * w.speed,
                      life: dist / w.speed, hostile: false, kind: w.splash, own: true });
        fxAbove.push({ type: "muzzle", x: mp.x, y: mp.y, ang: m.ang, size: mc.size, t0: simT });
        RECOIL[i] = 1;
      }
      continue;
    }
    // M/S mounts keep the C10 behavior — auto-slew, auto-fire at the gunboats
    let tgt = null, bd = Infinity;
    if (w.active) for (const b of boats) {
      const d = Math.hypot(b.x - mp.x, b.y - mp.y);
      if (d < bd && d <= w.range) { bd = d; tgt = b; }
    }
    const desired = tgt ? angleTo(mp, tgt) : ship.heading;
    const dAng = angDiff(desired, m.ang);
    m.ang += clamp(dAng, -w.traverse * dt, w.traverse * dt);
    m.cool -= dt;
    if (tgt && m.cool <= 0 && Math.abs(angDiff(desired, m.ang)) <= 0.06) {
      m.cool = 1 / w.rate;
      const d = dirOf(m.ang + (rng() * 2 - 1) * w.spread);
      const dist = Math.min(bd + (rng() * 2 - 1) * 30, w.range);
      shells.push({ x: mp.x, y: mp.y, vx: d.x * w.speed, vy: d.y * w.speed,
                    life: dist / w.speed, hostile: false, kind: w.splash, tgt });
      fxAbove.push({ type: "muzzle", x: mp.x, y: mp.y, ang: m.ang, size: mc.size, t0: simT });
      RECOIL[i] = 1;
    }
  }
}

const shells = [];
const scopeFlashes = [];   // C11 fall-of-shot: own mb16 bursts flash on the mini scope
function stepShells(dt) {
  for (let i = shells.length - 1; i >= 0; i--) {
    const p = shells[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    /* C15 — the rule of the waters: mb16 splash shells ARC OVER terrain (ballistic, flight
       untouched); everything FLAT — gunboat dp5 at the player, own dp5 direct rounds —
       TERMINATES on rock with a gray basalt puff, not foam. Islands are cover both ways. */
    if (p.kind !== "mb16" && terrainBodyAt(p.x, p.y)) {
      spawnRockHit(p.x, p.y, false);
      shells.splice(i, 1);
      continue;
    }
    if (p.life > 0) continue;
    if (p.kind === "mb16" && terrainBodyAt(p.x, p.y)) {
      // a ballistic burst that comes DOWN on land: rock dust, not a water column — but it
      // still marks the scope (fall of shot is fall of shot)
      spawnRockHit(p.x, p.y, true);
      if (!p.hostile) scopeFlashes.push({ x: p.x, y: p.y, t0: simT });
      shells.splice(i, 1);
      continue;
    }
    spawnSplash(p.x, p.y, p.kind, p.hostile);
    if (!p.hostile && p.kind === "mb16")             // C11: your burst exists on the scope
      scopeFlashes.push({ x: p.x, y: p.y, t0: simT });
    let hit = p.tgt || null;
    if (!hit && p.own)                                // forced shells carry no tgt — any boat under the burst counts
      for (const b of boats) if (Math.hypot(b.x - p.x, b.y - p.y) < 42) hit = b;
    if (hit && Math.hypot(hit.x - p.x, hit.y - p.y) < 42)
      fxUnder.push({ type: "boathit", x: hit.x, y: hit.y, t0: simT });
    shells.splice(i, 1);
  }
}

// scheduled scene beats: door-gun stitches, DC volleys, one torpedo pass on repeat
const pending = [];    // {t, fn}
let nextStitch = 5, nextDC = 12, nextTorp = 9;
const charges = [], torps = [], bubbles = [];
function stepEvents(dt) {
  if (simT >= nextStitch) {
    nextStitch = simT + 7 + rng() * 4;
    const b = boats[Math.floor(rng() * 2)];
    const la = rng() * TAU, ld = dirOf(la);
    for (let k = 0; k < 7; k++) {
      const px = b.x + ld.x * (70 - k * 17) + (rng() * 2 - 1) * 7;
      const py = b.y + ld.y * (70 - k * 17) + (rng() * 2 - 1) * 7;
      pending.push({ t: simT + k * 0.055, fn: () => {
        // C15 — a stitch round that walks onto a rock puffs gray instead of splashing
        if (terrainBodyAt(px, py)) spawnRockHit(px, py, false);
        else spawnSplash(px, py, "gun", true);
      } });
    }
  }
  if (simT >= nextDC) {                              // the racks roll — 3 scattered stern charges
    nextDC = simT + 13 + rng() * 4;
    const aft = dirOf(ship.heading);
    for (let k = 0; k < 3; k++) {
      const px = ship.x - aft.x * (150 + k * 45) + (rng() * 2 - 1) * 55;
      const py = ship.y - aft.y * (150 + k * 45) + (rng() * 2 - 1) * 55;
      pending.push({ t: simT + k * 0.35, fn: () => {
        if (terrainBodyAt(px, py)) return;           // C15 — charges roll into water, never onto rock
        spawnSplash(px, py, "gun", true);            // the sink plop
        charges.push({ x: px, y: py, t0: simT, fuse: 1.6 });
      } });
    }
  }
  if (simT >= nextTorp) {                            // one runner crosses close aboard
    nextTorp = simT + 20 + rng() * 6;
    let launched = false;
    if (rng() < 0.5 && TERRAIN.length) {
      /* C15 staging — half the runs, the torpedo's line is drawn THROUGH a terrain feature
         near the ship, so the gate gets to watch a torpedo die on rock without waiting. */
      const cands = TERRAIN.filter((F) => {
        const d = Math.hypot(F.x - ship.x, F.y - ship.y);
        return d > 250 && d < 900;
      });
      if (cands.length) {
        const F = cands[Math.floor(rng() * cands.length)];
        const a = rng() * TAU, u = dirOf(a);
        const sx = F.x + u.x * 700, sy = F.y + u.y * 700;
        if (!terrainBodyAt(sx, sy)) {                // nothing spawns inside terrain
          torps.push({ x: sx, y: sy, vx: -u.x * 120, vy: -u.y * 120, life: 13, emit: 0 });
          launched = true;
        }
      }
    }
    if (!launched) {                                 // the classic close-aboard pass
      const side = rng() < 0.5 ? 1 : -1;
      const f = dirOf(ship.heading), r = { x: -f.y * side, y: f.x * side };
      const start = { x: ship.x + r.x * 700 + f.x * 250, y: ship.y + r.y * 700 + f.y * 250 };
      const ang = angleTo(start, { x: ship.x - r.x * 90 - f.x * 60, y: ship.y - r.y * 90 - f.y * 60 });
      const d = dirOf(ang);
      if (!terrainBodyAt(start.x, start.y))
        torps.push({ x: start.x, y: start.y, vx: d.x * 120, vy: d.y * 120, life: 13, emit: 0 });
    }
  }
  for (let i = pending.length - 1; i >= 0; i--)
    if (simT >= pending[i].t) { pending[i].fn(); pending.splice(i, 1); }
  for (let i = charges.length - 1; i >= 0; i--) {
    const c = charges[i];
    if (simT - c.t0 >= c.fuse) {
      fxUnder.push({ type: "dcblast", x: c.x, y: c.y, r: 46, t0: simT });
      charges.splice(i, 1);
    }
  }
  for (let i = torps.length - 1; i >= 0; i--) {
    const t = torps[i];
    t.x += t.vx * dt; t.y += t.vy * dt; t.life -= dt; t.emit -= dt;
    if (terrainBodyAt(t.x, t.y)) {                   // C15 — torpedoes die on rock, full column
      spawnSplash(t.x, t.y, "mb16", true);
      torps.splice(i, 1);
      continue;
    }
    if (t.emit <= 0) {                               // the bright bubbling line
      t.emit = 0.03;
      bubbles.push({ x: t.x + (rng() * 2 - 1) * 2, y: t.y + (rng() * 2 - 1) * 2, t0: simT });
      if (bubbles.length > 500) bubbles.shift();
    }
    if (t.life <= 0) torps.splice(i, 1);
  }
}

/* ════════════════════════════ WAKE — persistent foam + bow wave ════════════════════════════ */
const wakePts = [];
let wakeEmit = 0;
function stepWake(dt) {
  wakeEmit -= dt;
  const speed = Math.hypot(ship.vx, ship.vy);
  if (wakeEmit > 0 || speed < 6) return;
  wakeEmit = 1 / 30;
  const f = dirOf(ship.heading), r = { x: -f.y, y: f.x };
  const stern = { x: ship.x - f.x * 96 * HULL_ART, y: ship.y - f.y * 96 * HULL_ART };   // C14: the stern moved aft
  const w = Math.min(1, speed / MOVE.max_speed_ahead);
  wakePts.push({ x: stern.x, y: stern.y, t0: simT, ang: ship.heading, w, sx: 0, sy: 0 });          // prop churn
  for (const side of [-1, 1])                        // shoulders drift outward → a widening V
    wakePts.push({ x: stern.x + r.x * side * 14 * HULL_ART, y: stern.y + r.y * side * 14 * HULL_ART, t0: simT,
                   ang: ship.heading, w: w * 0.7, sx: r.x * side * 7 * HULL_ART, sy: r.y * side * 7 * HULL_ART });
  if (wakePts.length > 900) wakePts.splice(0, wakePts.length - 900);
}
function drawWake() {
  const z = cfg.view.zoom, life = cfg.wake.life, wd = cfg.wake.width;
  for (const p of wakePts) {
    const age = (simT - p.t0) / life;
    if (age >= 1) continue;
    const [px, py] = w2s(p.x + p.sx * (simT - p.t0), p.y + p.sy * (simT - p.t0));
    const r = (1.6 + p.w * 3 + age * 6 * p.w) * wd * z;
    const a = (p.sx === 0 && age < 0.12 ? 0.20 : 0.12) * p.w * Math.pow(1 - age, 1.6);
    ctx.fillStyle = `rgba(228,240,242,${a.toFixed(3)})`;
    ctx.save(); ctx.translate(px, py); ctx.rotate(p.ang); ctx.scale(1, 1.7);   // elongated along track
    ctx.beginPath(); ctx.arc(0, 0, r, 0, TAU); ctx.fill();
    ctx.restore();
  }
  // torpedo bubble trail — brighter than wake foam, tight line
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i], age = (simT - b.t0) / 2.8;
    if (age >= 1) { bubbles.splice(i, 1); continue; }
    const [px, py] = w2s(b.x, b.y);
    ctx.fillStyle = `rgba(228,240,242,${(0.6 * (1 - age)).toFixed(3)})`;
    ctx.beginPath(); ctx.arc(px, py, (0.8 + age * 2.4) * z, 0, TAU); ctx.fill();
  }
}
function drawBowWave() {   // inside ship-local transform, before the hull fill overlaps it
  const spd01 = clamp(Math.hypot(ship.vx, ship.vy) / MOVE.max_speed_ahead, 0, 1);
  if (spd01 < 0.05) return;
  ctx.strokeStyle = `rgba(228,240,242,${(0.12 + 0.5 * spd01).toFixed(3)})`;
  ctx.lineWidth = lw(2); ctx.lineCap = "round";
  for (const s of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(s * 3, -118);
    ctx.quadraticCurveTo(s * 12, -112, s * (14 + spd01 * 5), -94);
    ctx.stroke();
  }
  ctx.lineCap = "butt";
}

/* ════════════════════════════ SPLASH COLUMNS — approved at C9, verbatim machinery ════════════════════════════
   Top-down vertical-column read via five cues: (1) white plume drawn ABOVE ship art,
   (2) sun-opposite shadow whose offset tracks column height, (3) scale-pop with overshoot,
   (4) droplets flying outward then stopping, (5) pale foam disc lingering 2–6 s.
   Dye knob: WWII navies tinted splashes per battery for spotting — mb16 brass, dp5 steel.
   C10 touch: disc ring + dye rim widths route through lw(). */
const SPLASH_KIND = {
  mb16: { r: 36, rise: 0.26, hang: 0.16, fall: 0.42, drops: 14, foamMul: 1.0, minPx: 12, dye: "rgba(205,186,142,0.55)" },
  dp5:  { r: 16, rise: 0.20, hang: 0.10, fall: 0.34, drops: 8,  foamMul: 0.8, minPx: 7,  dye: "rgba(147,167,174,0.6)" },
  gun:  { r: 6,  rise: 0.15, hang: 0.05, fall: 0.22, drops: 4,  foamMul: 0.5, minPx: 4,  dye: null },
};
const splashes = [];
function spawnSplash(x, y, kind, hostile) {
  const K = SPLASH_KIND[kind];
  const drops = [];
  for (let i = 0; i < K.drops; i++) {
    const a = rng() * TAU;
    drops.push({ dx: Math.sin(a), dy: -Math.cos(a), dist: K.r * (1.2 + rng()) });
  }
  splashes.push({ x, y, kind, hostile: !!hostile, t0: simT, drops });
  if (splashes.length > 80) splashes.shift();
}
function colH(K, age) {
  if (age < K.rise) return easeOutBack(age / K.rise);          // overshoot pop
  if (age < K.rise + K.hang) return 1;
  const f = (age - K.rise - K.hang) / K.fall;
  return f >= 1 ? 0 : 1 - f * f;
}
function drawSplashWater(reduced) {   // foam discs + column shadows + DC domes — UNDER ship art
  const z = cfg.view.zoom, ss = cfg.splash.scale;
  for (let i = splashes.length - 1; i >= 0; i--) {
    const sp = splashes[i], K = SPLASH_KIND[sp.kind];
    const age = simT - sp.t0, foamLife = cfg.splash.foam_life * K.foamMul;
    if (age >= foamLife) { splashes.splice(i, 1); continue; }
    const [px, py] = w2s(sp.x, sp.y);
    const Rf = Math.max(K.r * ss * z, K.minPx);
    // (5) lingering foam disc — kept even under reduced motion; it carries gameplay info
    const grow = reduced ? 1 : 0.75 + 0.35 * Math.min(age / 0.6, 1);
    const fa = 0.34 * Math.pow(1 - age / foamLife, 1.3);
    ctx.fillStyle = `rgba(228,240,242,${(fa * 0.8).toFixed(3)})`;
    ctx.beginPath(); ctx.arc(px, py, Rf * grow, 0, TAU); ctx.fill();
    ctx.strokeStyle = `rgba(228,240,242,${fa.toFixed(3)})`; ctx.lineWidth = lw(1.4);
    ctx.beginPath(); ctx.arc(px, py, Rf * grow, 0, TAU); ctx.stroke();
    if (cfg.splash.dye && K.dye && !sp.hostile && age < foamLife * 0.4) {   // per-battery rim tint
      ctx.strokeStyle = K.dye; ctx.lineWidth = lw(2);
      ctx.globalAlpha = 1 - age / (foamLife * 0.4);
      ctx.beginPath(); ctx.arc(px, py, Rf * grow * 0.82, 0, TAU); ctx.stroke();
      ctx.globalAlpha = 1;
    }
    if (reduced) continue;
    // (2) sun-opposite shadow, offset tracking column height
    const h = colH(K, age);
    if (h > 0.02) {
      const off = (2 + h * K.r * ss * 0.5) * z;
      ctx.fillStyle = `rgba(2,10,14,${(0.30 * Math.min(1, h)).toFixed(3)})`;
      ctx.save(); ctx.translate(px + SHADOW.x * off, py + SHADOW.y * off); ctx.scale(1, 0.55);
      ctx.beginPath(); ctx.arc(0, 0, Rf * 0.7 * h, 0, TAU); ctx.fill();
      ctx.restore();
    }
  }
  // DC underwater blast — dome lit from below, subsurface glow, dark ring chasing it
  for (let i = fxUnder.length - 1; i >= 0; i--) {
    const e = fxUnder[i], age = simT - e.t0;
    const life = e.type === "dcblast" ? 0.9 : 0.5;
    if (age >= life) { fxUnder.splice(i, 1); continue; }
    const k = age / life, [px, py] = w2s(e.x, e.y);
    if (e.type === "dcblast") {
      const R = e.r * z;
      const gl = ctx.createRadialGradient(px, py, 0, px, py, R * 1.5);
      gl.addColorStop(0, `rgba(80,160,170,${(0.22 * (1 - k)).toFixed(3)})`);
      gl.addColorStop(1, "rgba(80,160,170,0)");
      ctx.fillStyle = gl;
      ctx.beginPath(); ctx.arc(px, py, R * 1.5, 0, TAU); ctx.fill();
      ctx.fillStyle = `rgba(228,240,242,${(0.35 * (1 - k)).toFixed(3)})`;
      ctx.beginPath(); ctx.arc(px, py, R * (0.3 + 0.7 * k), 0, TAU); ctx.fill();
      ctx.strokeStyle = `rgba(10,30,42,${(0.8 * (1 - k)).toFixed(3)})`; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(px, py, Math.max(0.5, R * k), 0, TAU); ctx.stroke();
    } else {   // boathit — red arc on a straddled gunboat
      ctx.strokeStyle = `rgba(217,79,43,${(0.85 * (1 - k)).toFixed(3)})`; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(px, py, (6 + 22 * k) * z, 0, TAU); ctx.stroke();
    }
  }
  // sinking charges — shrinking dot + spreading ring (C5 language)
  for (const c of charges) {
    const sink = clamp((simT - c.t0) / c.fuse, 0, 1);
    const [px, py] = w2s(c.x, c.y);
    ctx.fillStyle = `rgba(228,240,242,${(0.7 - sink * 0.5).toFixed(3)})`;
    ctx.beginPath(); ctx.arc(px, py, Math.max(0.5, (3.5 - sink * 2) * z), 0, TAU); ctx.fill();
    ctx.strokeStyle = `rgba(228,240,242,${(0.3 - sink * 0.2).toFixed(3)})`; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(px, py, (5 + sink * 6) * z, 0, TAU); ctx.stroke();
  }
}
function drawSplashPlumes(reduced) {   // (1) plume + (3) pop + (4) droplets — ABOVE ship art
  if (reduced) return;                 // reduced motion keeps only the discs (drawn under)
  const z = cfg.view.zoom, ss = cfg.splash.scale;
  for (const sp of splashes) {
    const K = SPLASH_KIND[sp.kind], age = simT - sp.t0;
    const h = colH(K, age);
    if (h > 0.02) {
      const [px, py] = w2s(sp.x, sp.y);
      const R = Math.max(K.r * ss * z, K.minPx) * (0.5 + 0.5 * Math.min(h, 1.15));
      const a = 0.92 * Math.min(1, h);
      ctx.fillStyle = `rgba(228,240,242,${a.toFixed(3)})`;
      ctx.beginPath(); ctx.arc(px, py, R * 0.6 * h, 0, TAU); ctx.fill();                       // base cap
      ctx.beginPath(); ctx.arc(px + SUN.x * R * 0.15, py + SUN.y * R * 0.15, R * 0.42 * h, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(px + SUN.x * R * 0.30, py + SUN.y * R * 0.30 - R * 0.12 * h, R * 0.26 * h, 0, TAU); ctx.fill();
      if (cfg.splash.dye && K.dye && !sp.hostile) {
        ctx.strokeStyle = K.dye; ctx.lineWidth = lw(2);
        ctx.beginPath(); ctx.arc(px, py, R * 0.72 * h, 0, TAU); ctx.stroke();
      }
    }
    if (age < 0.9) {                   // droplets: fly out, stop, fade
      const k = Math.min(age / 0.5, 1), eased = 1 - (1 - k) * (1 - k);
      const da = age < 0.5 ? 0.9 : Math.max(0, 0.9 * (1 - (age - 0.5) / 0.4));
      ctx.fillStyle = `rgba(228,240,242,${da.toFixed(3)})`;
      for (const d of sp.drops) {
        const [px, py] = w2s(sp.x + d.dx * d.dist * eased * ss, sp.y + d.dy * d.dist * eased * ss);
        ctx.fillRect(px - 0.8, py - 0.8, 1.6, 1.6);
      }
    }
  }
}

/* ════════════════════════════ ABOVE-SHIP FX — muzzle flashes + C15 rock-hit dust ════════════════════════════ */
const fxAbove = [], fxUnder = [];
function spawnRockHit(x, y, big) {
  // C15 — flat fire dying on rock: gray basalt dust, emphatically NOT foam. Speckle offsets
  // come from the scene rng (cosmetic) — the terrain stream never draws here.
  const specks = [];
  const n = big ? 7 : 4;
  for (let i = 0; i < n; i++) {
    const a = rng() * TAU, d = (big ? 30 : 13) * (0.6 + rng());
    specks.push([Math.sin(a) * d, -Math.cos(a) * d]);
  }
  fxAbove.push({ type: "rockhit", x, y, big: !!big, t0: simT, specks });
}
function drawFxAbove() {
  const z = cfg.view.zoom;
  for (let i = fxAbove.length - 1; i >= 0; i--) {
    const e = fxAbove[i], age = simT - e.t0;
    const life = e.type === "rockhit" ? (e.big ? 0.7 : 0.45) : 0.12;
    if (age >= life) { fxAbove.splice(i, 1); continue; }
    const k = age / life;
    if (e.type === "rockhit") {   // C15 — gray dust puff + darker core + flying grit
      const [px, py] = w2s(e.x, e.y);
      const R = Math.max((e.big ? 26 : 9) * (0.55 + 0.8 * k) * z, 3);
      ctx.fillStyle = `rgba(126,120,108,${(0.55 * (1 - k)).toFixed(3)})`;
      ctx.beginPath(); ctx.arc(px, py, R, 0, TAU); ctx.fill();
      ctx.fillStyle = `rgba(58,54,46,${(0.5 * (1 - k)).toFixed(3)})`;
      ctx.beginPath(); ctx.arc(px, py, R * 0.5, 0, TAU); ctx.fill();
      const eased = 1 - (1 - Math.min(k * 1.4, 1)) ** 2;
      ctx.fillStyle = `rgba(140,134,120,${(0.7 * (1 - k)).toFixed(3)})`;
      for (const [ox, oy] of e.specks) {
        const [qx, qy] = w2s(e.x + ox * eased, e.y + oy * eased);
        ctx.fillRect(qx - 0.9, qy - 0.9, 1.8, 1.8);
      }
      continue;
    }
    if (e.type === "muzzle") {
      const d = dirOf(e.ang), len = FLASH_LEN[e.size] * HULL_ART;   // C14: muzzle reach rides the hull scale
      const [px, py] = w2s(e.x + d.x * len, e.y + d.y * len);
      ctx.fillStyle = `rgba(232,180,110,${(0.9 * (1 - k)).toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(px, py, (e.size === "L" ? 6.5 : e.size === "M" ? 3.2 : 2.2) * (1 + k) * z, 0, TAU);
      ctx.fill();
    } else {   // hostile gunflash
      const [px, py] = w2s(e.x, e.y);
      ctx.fillStyle = `rgba(233,103,66,${(0.9 * (1 - k)).toFixed(3)})`;
      ctx.beginPath(); ctx.arc(px, py, 3 * (1 + k) * z, 0, TAU); ctx.fill();
    }
  }
}
/* ════════════════════════════ CREST-FOAM STREAKS — heavy weather's signature ════════════════════════════
   Thin white lines that form and break along swell crests (crest direction = perpendicular to
   the main wavevector). Spawned near crests, they grow, arc slightly, and fade. High-frequency
   layer — fades with the zoom TARGET; width rides the stroke compensation. */
const STREAKS = [];
function stepStreaks(dt, reduced) {
  const inten = cfg.foam.crest_streaks;
  if (reduced || inten <= 0.02) { STREAKS.length = 0; return; }
  const z = cfg.view.zoom;
  for (let k = 0; k < 3; k++) {
    if (rng() > inten * 0.75) continue;
    const wx = cam.x + (rng() - 0.5) * W / z, wy = cam.y + (rng() - 0.5) * H / z;
    if (swellH(wx, wy, seaT) < 0.55) continue;                    // crests only
    STREAKS.push({ x: wx, y: wy, t0: simT, life: 1.6 + rng() * 1.2,
                   len: 18 + rng() * 26, ang: -Math.PI / 4 + (rng() - 0.5) * 0.5 });
    if (STREAKS.length > 90) STREAKS.shift();
  }
}
function drawStreaks() {
  const z = cfg.view.zoom, fade = 0.45 + 0.55 * hfFade();
  for (let i = STREAKS.length - 1; i >= 0; i--) {
    const s = STREAKS[i], k = (simT - s.t0) / s.life;
    if (k >= 1) { STREAKS.splice(i, 1); continue; }
    const a = 0.30 * Math.sin(Math.PI * k) * fade * cfg.foam.crest_streaks;
    if (a <= 0.01) continue;
    const dx = Math.cos(s.ang), dy = Math.sin(s.ang);
    const half = s.len * (0.5 + 0.7 * k) * z / 2;
    const [px, py] = w2s(s.x, s.y);
    ctx.strokeStyle = `rgba(228,240,242,${a.toFixed(3)})`;
    ctx.lineWidth = lw(1.3);
    ctx.beginPath();
    ctx.moveTo(px - dx * half, py - dy * half);
    ctx.quadraticCurveTo(px - dy * 4 * z, py + dx * 4 * z, px + dx * half, py + dy * half);
    ctx.stroke();
  }
}

/* ════════════════════════════ C15 — TERRAIN ART · the waters' look ════════════════════════════
   Each body, coast-out: (a) SHOAL HALO — pale shallow sea-green fading to nothing at ~shoal×
   the coast radius (the sea gets pale near land); (b) FOAM FRINGE — two breathing foam rings
   hugging the coastline (the splash-disc foam language, slow pulse on the sea clock; static
   under reduced motion but KEPT — it carries gameplay info, where the coast is); (c) the
   BODY — dark basalt gray-brown, blobby smoothed coast, darker heart + facet lines for
   relief. Clearly NOT hostile-red, NOT ship-steel: warm dark grays. Islets carry their
   deadpan props — scrubby bushes, a lone nav light on a slow blink. Rock bodies get a
   min-px ART floor (same trick as the swarmers) so a 10 u reef still reads at 0.4; the SIM
   circle stays honest at world size. World layer — strokes ride lw(). */
function traceBlob(B, scale) {   // smoothed coast: quadratics through edge midpoints
  const n = B.pts.length, sp = [];
  for (const p of B.pts) sp.push(w2s(B.x + (p[0] - B.x) * scale, B.y + (p[1] - B.y) * scale));
  ctx.beginPath();
  ctx.moveTo((sp[n - 1][0] + sp[0][0]) / 2, (sp[n - 1][1] + sp[0][1]) / 2);
  for (let i = 0; i < n; i++) {
    const q = sp[(i + 1) % n];
    ctx.quadraticCurveTo(sp[i][0], sp[i][1], (sp[i][0] + q[0]) / 2, (sp[i][1] + q[1]) / 2);
  }
  ctx.closePath();
}
const TONE = {   // 2–3 basalt tones inside the house value range — never red, never steel-blue
  isletBody: "#4A443A", rockBody: "#3F3A32",
  core: "rgba(22,19,15,0.30)", facet: "rgba(16,14,11,0.5)", coast: "rgba(15,13,10,0.55)",
  shoal: "74,128,120", bush: "#2F4A33",
};
function drawTerrain(seaTNow, reduced) {
  const z = cfg.view.zoom, fr = cfg.terrain.fringe, sh = cfg.terrain.shoal;
  for (const F of TERRAIN) {
    const [fx, fy] = w2s(F.x, F.y);
    const cull = (F.r * Math.max(sh, 1.3) + 60) * z + 80;
    if (fx < -cull || fx > W + cull || fy < -cull || fy > H + cull) continue;
    const bodies = F.polys.map((B) => ({ B, boost: Math.max(1, 5 / Math.max(0.001, B.r * z)) }));
    for (const { B, boost } of bodies) {              // (a) shoal halos first, under everything
      const [bx, by] = w2s(B.x, B.y);
      const Ro = Math.max(1, B.r * boost * sh * z);
      const g = ctx.createRadialGradient(bx, by, Ro * 0.35, bx, by, Ro);
      g.addColorStop(0, `rgba(${TONE.shoal},0.30)`);
      g.addColorStop(0.55, `rgba(${TONE.shoal},0.15)`);
      g.addColorStop(1, `rgba(${TONE.shoal},0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(bx, by, Ro, 0, TAU); ctx.fill();
    }
    for (const { B, boost } of bodies) {              // (b) foam fringe — breathing, coast-hugging
      const pulse = reduced ? 0 : Math.sin(seaTNow * 0.7 + F.ph + B.x * 0.013);
      const a1 = (0.30 + 0.10 * pulse) * fr, a2 = (0.13 + 0.05 * pulse) * fr;
      if (a1 > 0.01) {
        ctx.strokeStyle = `rgba(228,240,242,${a1.toFixed(3)})`;
        ctx.lineWidth = Math.max(lw(1.6), 1.2);
        traceBlob(B, boost * (1.05 + 0.013 * pulse)); ctx.stroke();
      }
      if (a2 > 0.01) {
        ctx.strokeStyle = `rgba(228,240,242,${a2.toFixed(3)})`;
        ctx.lineWidth = Math.max(lw(1.1), 1);
        traceBlob(B, boost * (1.16 + 0.025 * pulse)); ctx.stroke();
      }
    }
    for (const { B, boost } of bodies) {              // (c) the rock itself
      traceBlob(B, boost);
      ctx.fillStyle = F.kind === "islet" ? TONE.isletBody : TONE.rockBody;
      ctx.fill();
      ctx.strokeStyle = TONE.coast; ctx.lineWidth = Math.max(lw(1.2), 1);
      ctx.stroke();
      traceBlob(B, boost * 0.52);                     // darker heart — cheap relief
      ctx.fillStyle = TONE.core; ctx.fill();
      ctx.strokeStyle = TONE.facet; ctx.lineWidth = Math.max(lw(1), 0.8);
      for (const [x0, y0, x1, y1] of B.facets) {
        const [p0x, p0y] = w2s(B.x + (x0 - B.x) * boost, B.y + (y0 - B.y) * boost);
        const [p1x, p1y] = w2s(B.x + (x1 - B.x) * boost, B.y + (y1 - B.y) * boost);
        ctx.beginPath(); ctx.moveTo(p0x, p0y); ctx.lineTo(p1x, p1y); ctx.stroke();
      }
    }
    for (const pr of F.props) {                       // (d) deadpan props — islets only
      const [ppx, ppy] = w2s(pr.x, pr.y);
      if (pr.type === "bush") {                       // scrubby bush: a dark-green dot cluster
        ctx.fillStyle = TONE.bush;
        for (const [ox, oy] of pr.offs) {
          ctx.beginPath();
          ctx.arc(ppx + ox * z, ppy + oy * z, Math.max(2.4 * z, 1.4), 0, TAU);
          ctx.fill();
        }
      } else {                                        // the lone navigation light, blinking slowly
        const on = reduced ? true : ((seaTNow * 0.45 + pr.ph) % 3) < 0.4;
        const rr = Math.max(2 * z, 1.6);
        if (on && !reduced) {                         // soft brass halo on the flash
          ctx.fillStyle = "rgba(205,186,142,0.22)";
          ctx.beginPath(); ctx.arc(ppx, ppy, rr * 3, 0, TAU); ctx.fill();
        }
        ctx.fillStyle = reduced ? "rgba(205,186,142,0.7)" : (on ? "#CDBA8E" : "rgba(205,186,142,0.28)");
        ctx.beginPath(); ctx.arc(ppx, ppy, rr, 0, TAU); ctx.fill();
      }
    }
  }
}

/* ════════════════════════════ SHIP ART — the C2 LOOK-LOCKED hull at the C14 SCALE ════════════════════════════
   Same silhouette, turret classes and line weights as design/hardpoint-hull.html — but the
   owner sized the hull up at C14: art scale 2.4 → 2.75. The deck furniture below is all
   hand-tuned in 2.4-scale coordinates, so every hull-local transform (outline, deck, mounts,
   bow wave) rides HULL_ART = 2.75/2.4 — one multiplier, uniform growth, strokes included.
   C10: every deck-art STROKE routes through lw(). The sim's terrain capsule (97×30) matches
   THIS hull; the sim underneath never sees any of the art. */
const HULL_SCALE = 2.75;                       // C14 — the hull grew (was 2.4 from the C2 gate)
const HULL_ART_BASE = 2.4;                     // the scale the C2 deck art was hand-tuned at
const HULL_ART = HULL_SCALE / HULL_ART_BASE;   // ×1.146 — applied in every hull-local transform
const HULL_PTS = (() => {  // C1 silhouette proportions at the ART-BASE scale (HULL_ART carries the rest)
  const pts = [[0, -50]];
  const quad = (p0, c, p1, n) => { for (let i = 1; i <= n; i++) { const t = i / n;
    const ax = p0[0] + (c[0] - p0[0]) * t, ay = p0[1] + (c[1] - p0[1]) * t;
    const bx = c[0] + (p1[0] - c[0]) * t, by = c[1] + (p1[1] - c[1]) * t;
    pts.push([ax + (bx - ax) * t, ay + (by - ay) * t]); } };
  quad([0, -50], [8, -38], [9.5, -24], 8); pts.push([10, 20]);
  quad([10, 20], [10, 32], [6, 35], 6); quad([6, 35], [0, 38], [-6, 35], 6);
  quad([-6, 35], [-10, 32], [-10, 20], 6); pts.push([-9.5, -24]);
  quad([-9.5, -24], [-8, -38], [0, -50], 8);
  return pts.map(([x, y]) => [x * HULL_ART_BASE, y * HULL_ART_BASE]);
})();
function hullTrace() {
  ctx.beginPath();
  ctx.moveTo(HULL_PTS[0][0], HULL_PTS[0][1]);
  for (const p of HULL_PTS) ctx.lineTo(p[0], p[1]);
  ctx.closePath();
}
function shipRide(reduced) {   // heave px + roll rad, from the analytic swell — render-only
  if (reduced) return { heave: 0, roll: 0, h01: 0 };
  const f = dirOf(ship.heading), r = { x: -f.y, y: f.x };
  const h01 = swellH(ship.x, ship.y, seaT);
  const dif = (swellH(ship.x + r.x * 30, ship.y + r.y * 30, seaT)
             - swellH(ship.x - r.x * 30, ship.y - r.y * 30, seaT)) * 0.5;
  return { heave: h01 * cfg.ship.heave_px, roll: dif * cfg.ship.roll_deg * Math.PI / 180 * 2, h01 };
}
function drawShip(reduced) {
  const z = cfg.view.zoom;
  const ride = shipRide(reduced);
  const [sx0, sy0] = w2s(ship.x, ship.y);
  const off = cfg.ship.shadow_px * (1 + 0.35 * ride.h01) * z;      // shadow breathes with the heave
  if (off > 0.2) {
    ctx.save();
    ctx.translate(sx0 + SHADOW.x * off, sy0 + SHADOW.y * off);
    ctx.scale(z * HULL_ART, z * HULL_ART); ctx.rotate(ship.heading + ride.roll);   // C14 scale
    hullTrace(); ctx.fillStyle = "rgba(2,10,14,0.38)"; ctx.fill();
    ctx.restore();
  }
  const sx = sx0 + SUN.x * ride.heave, sy = sy0 + SUN.y * ride.heave;   // lift toward the light
  ctx.save();
  ctx.translate(sx, sy); ctx.scale(z * HULL_ART, z * HULL_ART);   // C14: the whole deck grows with the hull
  ctx.rotate(ship.heading + ride.roll);
  drawBowWave();
  hullTrace();
  ctx.fillStyle = "#3C4F57"; ctx.fill();
  const speed = Math.hypot(ship.vx, ship.vy);
  ctx.strokeStyle = `rgba(228,240,242,${Math.min(0.55, 0.12 + speed / MOVE.max_speed_ahead * 0.5)})`;
  ctx.lineWidth = lw(1.2); ctx.stroke();
  ctx.fillStyle = "#5A707A";
  ctx.fillRect(-13, -31, 26, 41); ctx.fillRect(-8, -43, 16, 12);      // superstructure + bridge
  ctx.fillStyle = "#4A5F68";
  ctx.fillRect(-4, -18, 8, 8);                                        // funnel
  ctx.strokeStyle = "#93A7AE"; ctx.lineWidth = lw(1);
  ctx.beginPath(); ctx.arc(0, 65, 14, 0, TAU); ctx.stroke();          // helipad stays clear
  ctx.beginPath(); ctx.moveTo(-8, 65); ctx.lineTo(8, 65); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -120); ctx.lineTo(0, -90); ctx.stroke();   // bow jack line
  // mounts — drawn hull-local so they ride the heave/roll with the deck; houses rotate to the
  // world barrel angle (local = world − heading). Class identity: L twin turret · M angular
  // house · S open AA ring (stowed in this scene — no air targets).
  for (let i = 0; i < MOUNTS.length; i++) {
    const mc = MOUNTS[i], m = mounts[i];
    RECOIL[i] *= 0.9;
    const rec = RECOIL[i];
    ctx.save(); ctx.translate(mc.x, mc.y);
    ctx.strokeStyle = "rgba(228,240,242,0.25)";   // barbette rings stay hull-fixed under the turret
    if (mc.size === "L") { ctx.lineWidth = lw(1.5); ctx.beginPath(); ctx.arc(0, 0, 11.5, 0, TAU); ctx.stroke(); }
    if (mc.size === "M") { ctx.lineWidth = lw(1); ctx.beginPath(); ctx.arc(0, 0, 7.5, 0, TAU); ctx.stroke(); }
    ctx.rotate(m.ang - ship.heading);
    if (mc.size === "L") {
      ctx.fillStyle = "#93A7AE";
      for (const bx of [-3.2, 3.2]) {
        ctx.fillRect(bx - 1.3, -9 - 26 + rec * 4, 2.6, 26);
        ctx.fillRect(bx - 1.9, -9 - 26 + rec * 4, 3.8, 3);          // muzzle brakes
      }
      ctx.fillStyle = "#647885";
      ctx.beginPath();
      ctx.moveTo(-8, 12); ctx.lineTo(-8, -4); ctx.quadraticCurveTo(-8, -10, 0, -10);
      ctx.quadraticCurveTo(8, -10, 8, -4); ctx.lineTo(8, 12); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = "rgba(10,30,40,0.55)"; ctx.lineWidth = lw(1); ctx.stroke();
      ctx.fillStyle = "#93A7AE";
      ctx.fillRect(-10, 3, 3, 2.4); ctx.fillRect(7, 3, 3, 2.4);      // rangefinder ears
    } else if (mc.size === "M") {
      ctx.fillStyle = "#93A7AE";
      ctx.fillRect(-1.1, -6 - 16 + rec * 3, 2.2, 16);
      ctx.fillRect(-1.7, -6 - 7 + rec * 3, 3.4, 7);                  // recoil sleeve
      ctx.fillStyle = "#647885";
      ctx.beginPath();
      ctx.moveTo(-5.5, 8); ctx.lineTo(-5.5, -2); ctx.lineTo(-3, -6.5);
      ctx.lineTo(3, -6.5); ctx.lineTo(5.5, -2); ctx.lineTo(5.5, 8); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = "rgba(10,30,40,0.55)"; ctx.lineWidth = lw(1); ctx.stroke();
    } else {
      ctx.strokeStyle = "#7E939C"; ctx.lineWidth = lw(1.2);
      ctx.beginPath(); ctx.arc(0, 0, 5.5, 0, TAU); ctx.stroke();     // open ring mount
      ctx.fillStyle = "#93A7AE";
      for (const bx of [-1.5, 1.5]) ctx.fillRect(bx - 0.55, -2 - 11 + rec * 2, 1.1, 11);
      ctx.fillStyle = "#647885";
      ctx.beginPath(); ctx.arc(0, 2.2, 2.6, 0, TAU); ctx.fill();     // pedestal + gunner tub
    }
    ctx.restore();
  }
  ctx.restore();
}

/* ════════════════════════════ GUNBOATS — C3 raft language, riding the same sea ════════════════════════════ */
function boatTrace() {
  ctx.beginPath();
  ctx.moveTo(0, -16); ctx.quadraticCurveTo(7, -8, 7, 2); ctx.lineTo(6, 14);
  ctx.lineTo(-6, 14); ctx.lineTo(-7, 2); ctx.quadraticCurveTo(-7, -8, 0, -16);
  ctx.closePath();
}
function drawBoats(reduced) {
  const z = cfg.view.zoom;
  // gunboats (~28 u) ride the same min-size law as the swarmers — inert at the default floor
  // (28·0.4 = 11.2 px > 10), it only bites when the minPx knob is pushed high
  const zb = z * Math.max(1, cfg.zoom.min_px / Math.max(0.001, BOAT_LEN * z));
  for (const b of boats) {
    const [px, py] = w2s(b.x, b.y);
    if (px < -60 || px > W + 60 || py < -60 || py > H + 60) continue;
    const bob = reduced ? 0 : swellH(b.x, b.y, seaT) * cfg.ship.heave_px * 0.8;
    const rock = reduced ? 0 : Math.sin(seaT * 0.9 + b.orbA * 3.1) * 0.05 * cfg.ship.roll_deg;
    const off = cfg.ship.shadow_px * 0.6 * z;
    ctx.save();   // shadow first, under the boat
    ctx.translate(px + SHADOW.x * off, py + SHADOW.y * off);
    ctx.scale(zb, zb); ctx.rotate(b.heading + rock);
    boatTrace(); ctx.fillStyle = "rgba(2,10,14,0.35)"; ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.translate(px + SUN.x * bob, py + SUN.y * bob);
    ctx.scale(zb, zb); ctx.rotate(b.heading + rock);
    boatTrace(); ctx.fillStyle = "#2E3E45"; ctx.fill();
    ctx.strokeStyle = "rgba(228,240,242,0.4)"; ctx.lineWidth = lw(1); ctx.stroke();
    ctx.fillStyle = "#4A5F68"; ctx.fillRect(-3.5, -4, 7, 9);          // gun house
    ctx.fillStyle = "#93A7AE"; ctx.fillRect(-0.8, -12, 1.6, 8);       // the gun
    ctx.restore();
  }
}

/* ════════════════════════════ TRACERS — C2 language: line + bright head on splash shells ════════════════════════════ */
function drawTracers() {
  const z = cfg.view.zoom;
  for (const p of shells) {
    const [px, py] = w2s(p.x, p.y);
    const [tx, ty] = w2s(p.x - p.vx * 0.03, p.y - p.vy * 0.03);
    if (p.hostile) {
      ctx.strokeStyle = "rgba(233,103,66,0.85)"; ctx.lineWidth = lw(1.2);
    } else if (p.kind === "mb16") {
      ctx.fillStyle = "rgba(228,240,242,0.95)";
      ctx.beginPath(); ctx.arc(px, py, Math.max(2.6 * z, 1.4), 0, TAU); ctx.fill();
      ctx.strokeStyle = "rgba(228,240,242,0.35)"; ctx.lineWidth = lw(2);
    } else {
      ctx.strokeStyle = "rgba(228,240,242,0.85)"; ctx.lineWidth = lw(1.2);
    }
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(px, py); ctx.stroke();
  }
}

/* ════════════════════════════ SEA PRESET — direction B, approved at the C9 gate 2026-07-09 ════════════════════════════
   The A/B vote is closed: HEAVY WEATHER shipped, with the owner's tunes applied (column scale
   1.15→1.4, foam disc life 4.5→3.4, wake foam life 9.5→9.0 — judged at zoom 0.51, which is now
   homeZoom). The sea is LOCKED here; its knobs remain below as closed reference sections only. */
const PRESETS = {
  B: { name: "HEAVY WEATHER",
       cfg: { swell: { amp: 0.95, speed: 1.4, scale: 1.15 }, glint: { intensity: 0.75 },
              foam: { density: 210, crest_bias: 0.85, crest_streaks: 0.8 },
              ship: { heave_px: 3.0, roll_deg: 2.6, shadow_px: 5.0 },
              splash: { scale: 1.4, foam_life: 3.4, dye: true }, wake: { life: 9.0, width: 1.35 } } },

function applyPreset(id) {
  const zoom = cfg.view.zoom;                        // the animated camera survives a reset
  cfg = structuredClone(DEFAULT_CFG);
  for (const [dom, vals] of Object.entries(PRESETS[id].cfg))
    for (const [k, v] of Object.entries(vals)) cfg[dom][k] = v;

/* ════════════════════════════ INPUT — wheel zoom, optional helm, autopilot otherwise ════════════════════════════ */
const keys = {};
let manualUntil = -1, paused = false;
let reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;   // house law: honored by default
addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (k === "p" && !e.repeat) togglePause();
  if (k === "h") { targetZoom = clamp(cfg.zoom.home, cfg.zoom.min, cfg.zoom.max); syncPanel(); }   // home view
  if ("wasd".includes(k)) { keys[k] = true; manualUntil = simT + 6; }
});
addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });
// THE C10 WHEEL — exponential steps on the TARGET; the animated zoom chases it in frame().
// Listener on the canvas only, so the knob panel keeps its own scroll; preventDefault so the
// page never scrolls (passive: false is required for that to take).
canvas.addEventListener("wheel", (e) => {
  e.preventDefault();
  if (!e.deltaY) return;
  targetZoom = clamp(targetZoom * Math.pow(cfg.zoom.wheel_step, -Math.sign(e.deltaY)),
                     cfg.zoom.min, cfg.zoom.max);
  syncPanel();
}, { passive: false });
/* THE C11 TRIGGER — hold RIGHT MOUSE = force the main battery onto the cursor. Mouse tracked
   on the window so the reticle survives leaving the canvas; mousedown on the canvas only so
   the knob panel keeps its native right-click. contextmenu suppressed on the canvas. */
const mouse = { x: innerWidth / 2, y: innerHeight / 3 };
let rmbHeld = false;
addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener("mousedown", (e) => { if (e.button === 2) { rmbHeld = true; e.preventDefault(); } });
addEventListener("mouseup", (e) => { if (e.button === 2) rmbHeld = false; });
canvas.addEventListener("contextmenu", (e) => e.preventDefault());
function cursorWorld() {   // screen → world, inverse of w2s at the live animated zoom
  const z = cfg.view.zoom;
  return { x: (mouse.x - W / 2) / z + cam.x, y: (mouse.y - H / 2) / z + cam.y };
}
function nearestLMount(pt) {   // readout + RANGEKEEPER both fire "from the nearest L mount"
  let best = null, bd = Infinity;
  for (const mc of MOUNTS) {
    if (mc.size !== "L") continue;
    const mp = mountWorld(mc);
    const d = Math.hypot(pt.x - mp.x, pt.y - mp.y);
    if (d < bd) { bd = d; best = mp; }
  }
  return { mp: best, dist: bd };
}
function readInput() {
  if (simT < manualUntil)
    return { thrust: (keys.w ? 1 : 0) + (keys.s ? -1 : 0), rudder: (keys.d ? 1 : 0) + (keys.a ? -1 : 0) };
  /* autopilot — C15: the fallback pilot knows the chart. Tangent avoidance overrides the
     wandering cruise; past ~1100 u it also leans for home so the demo never drifts out of
     the archipelago. Manual helm (WASD) gets NO assists — steering the channel is the
     player's job, which is this gate. */
  let rudder = Math.sin(simT * 0.07) * 0.3 + Math.sin(simT * 0.023 + 1.7) * 0.2;
  if (Math.hypot(ship.x, ship.y) > 1100)
    rudder = clamp(angDiff(angleTo(ship, { x: 0, y: 0 }), ship.heading) * 1.2, -0.8, 0.8);
  const av = avoidHeading(ship.x, ship.y, ship.heading, 320, 110, ship);
  if (av !== null) rudder = clamp(angDiff(av, ship.heading) * 2.5, -1, 1);
  return { thrust: ship.along < MOVE.max_speed_ahead * 0.7 ? 1 : 0, rudder };
}
function togglePause() {
  paused = !paused;
  const b = document.getElementById("btn-pause");
  if (b) b.classList.toggle("active", paused);
}

/* ════════════════════════════ KNOB PANEL ════════════════════════════ */
const SLIDERS = [   // [section, [path, label, min, max, step]...] — first section = the gate, open; rest = approved reference, closed
  ["The waters — C15 tables", [
    ["terrain.islets", "islet count", 2, 4, 1],

  ["Fire control — the C11 tables", [
    ["fire.snap_radius", "RK snap radius (u)", 40, 240, 1],
    ["fire.flash_life", "scope flash life (s)", 0.4, 3, 0.05]]],
  ["Zoom — the C10 tables", [

    ["zoom.max", "zoom max", 0.7, 1.2, 0.01],
    ["zoom.home", "home zoom", 0.4, 0.85, 0.01],
    ["zoom.wheel_step", "wheel step (×/notch)", 1.05, 1.4, 0.01],
