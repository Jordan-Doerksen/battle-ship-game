  ["Light & foam", [["glint.intensity", "glint intensity", 0, 1, 0.01], ["foam.density", "fleck density", 0, 260, 1],
                    ["foam.crest_bias", "crest bias", 0, 1, 0.01], ["foam.crest_streaks", "crest streaks", 0, 1, 0.01]]],
  ["Ship ride", [["ship.heave_px", "heave (px)", 0, 5, 0.1], ["ship.roll_deg", "roll (deg)", 0, 4, 0.1],
                 ["ship.shadow_px", "hull shadow (px)", 0, 8, 0.1]]],
  ["Splash columns", [["splash.scale", "column scale", 0.5, 1.8, 0.01], ["splash.foam_life", "foam disc life (s)", 1, 6, 0.1]]],
  ["Wake", [["wake.life", "foam life (s)", 2, 12, 0.1], ["wake.width", "width", 0.5, 2, 0.01]]],
];
// knobs that reshape the field — they re-run the generator live (same seed + same knobs = same waters)
const REGEN_PATHS = new Set(["terrain.islets", "terrain.rocks", "terrain.size"]);
function getPath(path) {
  if (path === "view.zoom") return targetZoom;               // the View slider reads/drives the TARGET
  const [a, b] = path.split("."); return cfg[a][b];
}
function setPath(path, v) {
  if (path === "view.zoom") { targetZoom = clamp(v, cfg.zoom.min, cfg.zoom.max); return; }
  const [a, b] = path.split("."); cfg[a][b] = v;
  if (a === "zoom") targetZoom = clamp(targetZoom, cfg.zoom.min, cfg.zoom.max);   // bounds moved under it
}
function buildPanel() {
  const body = document.getElementById("tuning-body");
  body.style.pointerEvents = "auto";
  let html = "";
  SLIDERS.forEach(([sect, items], si) => {
    html += `<details class="sect"${si === 0 ? " open" : ""}><summary>${sect}</summary><div class="body">`;
    if (si === 0)   // the seed row — a typed integer, not a slider; REGENERATE = next archipelago
      html += `<div class="tun"><div class="row"><span class="name">seed (retype/± regenerates)</span>
        <span class="val" id="val-terrain-seed"></span></div>
        <div style="display:flex;gap:6px;align-items:center">
        <input type="number" id="in-terrain-seed" step="1" value="${cfg.terrain.seed}">
        <button class="kbtn" id="btn-regen" style="margin:0">Regenerate</button></div></div>`;
    for (const [path, label, min, max, step] of items)
      html += `<div class="tun"><div class="row"><span class="name">${label}</span>
        <span class="val" id="val-${path.replace(".", "-")}"></span></div>
        <input type="range" id="in-${path.replace(".", "-")}" data-path="${path}"
               min="${min}" max="${max}" step="${step}"></div>`;
    if (si === 1)   // the C11 toggles live with the fire-control tables
      html += `<div style="margin-top:2px">
        <button class="kbtn" id="btn-rk">Rangekeeper</button>
        <button class="kbtn" id="btn-ft">Flight time</button></div>`;
    if (si === 2)   // the two C10 controls stay with the zoom tables
      html += `<div style="margin-top:2px">
        <button class="kbtn" id="btn-home">Home</button>
        <button class="kbtn" id="btn-comp">Stroke comp</button></div>`;
    html += `</div></details>`;
  });
  html += `<div style="margin-top:10px">
    <button class="kbtn" id="btn-dye">splash dye</button>
    <button class="kbtn" id="btn-reduced">reduced motion</button>
    <button class="kbtn" id="btn-pause">pause</button></div>
    <button id="reset-cfg">Reset C15 defaults</button>`;
  body.innerHTML = html;
  body.querySelectorAll("input[type=range]").forEach((el) => {
    el.addEventListener("input", () => {
      setPath(el.dataset.path, parseFloat(el.value));
      if (REGEN_PATHS.has(el.dataset.path)) generateTerrain();   // counts/size reshape the field live
      updateVals();
    });
  });
  document.getElementById("in-terrain-seed").addEventListener("input", (e) => {
    const v = parseInt(e.target.value, 10);
    if (!Number.isFinite(v)) return;                 // mid-typing ("-", empty) — wait for a number
    cfg.terrain.seed = v; generateTerrain(); updateVals();
  });
  document.getElementById("btn-regen").addEventListener("click", () => {
    cfg.terrain.seed = (cfg.terrain.seed | 0) + 1;   // next archipelago — the seed stays visible/typeable
    generateTerrain(); syncPanel();
  });
  document.getElementById("btn-rk").addEventListener("click", () => { cfg.fire.rangekeeper = !cfg.fire.rangekeeper; syncPanel(); });
  document.getElementById("btn-ft").addEventListener("click", () => { cfg.fire.show_time = !cfg.fire.show_time; syncPanel(); });
  document.getElementById("btn-home").addEventListener("click", () => {
    targetZoom = clamp(cfg.zoom.home, cfg.zoom.min, cfg.zoom.max); syncPanel();
  });
  document.getElementById("btn-comp").addEventListener("click", () => { compOn = !compOn; syncPanel(); });
  document.getElementById("btn-dye").addEventListener("click", () => { cfg.splash.dye = !cfg.splash.dye; syncPanel(); });
  document.getElementById("btn-reduced").addEventListener("click", () => { reducedMotion = !reducedMotion; syncPanel(); });
  document.getElementById("btn-pause").addEventListener("click", togglePause);
  document.getElementById("reset-cfg").addEventListener("click", () => {
    applyPreset("B");                     // approved sea/zoom/fire + the C15 terrain defaults (all in DEFAULT_CFG)
    targetZoom = cfg.zoom.home;
    compOn = true;
    generateTerrain();                    // seed 7 again — the default waters
    syncPanel();
  });
}
function updateVals() {
  for (const [, items] of SLIDERS)
    for (const [path] of items) {
      const el = document.getElementById(`val-${path.replace(".", "-")}`);
      if (el) el.textContent = (+getPath(path)).toFixed(2).replace(/\.?0+$/, "") || "0";
    }
  const sv = document.getElementById("val-terrain-seed");   // the seed readout rides along
  if (sv) sv.textContent = String(cfg.terrain.seed | 0);
}
function syncPanel() {
  for (const [, items] of SLIDERS)
    for (const [path] of items) {
      const el = document.getElementById(`in-${path.replace(".", "-")}`);
      if (el) el.value = getPath(path);
    }
  const seedIn = document.getElementById("in-terrain-seed");
  if (seedIn) seedIn.value = cfg.terrain.seed;
  updateVals();
  document.getElementById("btn-rk").classList.toggle("active", cfg.fire.rangekeeper);
  document.getElementById("btn-ft").classList.toggle("active", cfg.fire.show_time);
  document.getElementById("btn-comp").classList.toggle("active", compOn);
  document.getElementById("btn-dye").classList.toggle("active", cfg.splash.dye);
  document.getElementById("btn-reduced").classList.toggle("active", reducedMotion);
}

/* ════════════════════════════ ZOOM READOUT — plate at bottom-center ════════════════════════════
   Current → target zoom + the visible world extent (viewport px / zoom). Canvas-drawn in the
   .plate language (clipped corners, brass edge). HUD — its stroke stays OUT of lw(). Renders
   every frame, paused or not: the camera stays live under pause so a frozen splash can be
   judged across the whole zoom range. Arrow form is constant so the plate never reflows. */
function drawZoomReadout() {
  const z = cfg.view.zoom;
  const text = `ZOOM ${z.toFixed(2)} → ${targetZoom.toFixed(2)}   ·   ${Math.round(W / z)} × ${Math.round(H / z)} u`;
  ctx.font = "10.5px ui-monospace, Menlo, Consolas, monospace";
  const bw = Math.ceil(ctx.measureText(text).width) + 26, bh = 26;
  const bx = Math.round((W - bw) / 2), by = H - 16 - bh;
  ctx.fillStyle = "rgba(13,32,40,0.88)";
  ctx.beginPath();
  ctx.moveTo(bx + 8, by); ctx.lineTo(bx + bw, by); ctx.lineTo(bx + bw, by + bh - 8);
  ctx.lineTo(bx + bw - 8, by + bh); ctx.lineTo(bx, by + bh); ctx.lineTo(bx, by + 8);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = "rgba(205,186,142,0.5)"; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = "#CDBA8E";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(text, bx + bw / 2, by + bh / 2 + 0.5);
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
}

/* ════════════════════════════ C11 — FORCED RETICLE + FLIGHT TIME + RANGEKEEPER ════════════════════════════
   The game's reticle language (HelmGauges._draw_reticle): faint foam ring at rest, red ring +
   four ticks + battery label while an order is held. NEW under it: the mb16 flight time to the
   burst point, live — dist/420 capped at 900/420 — or "MAX RANGE · BEARING" as the mode telltale
   when the cursor is beyond the guns. HUD — nothing here routes through lw(). */
const MONO_FONT = 'ui-monospace, "Cascadia Mono", Menlo, Consolas, monospace';
function rangekeeperSolve(cw) {
  /* Advisory lead assist: the surface contact nearest the cursor, gated by the snap-radius
     knob; two-pass intercept for an mb16 shell from the nearest L mount (flight time to the
     contact now, then to where it will be by then). The shells still obey the CURSOR. */
  if (!cfg.fire.rangekeeper) return null;
  let tgt = null, bd = Infinity;
  for (const c of [...boats, ...swarmers]) {
    const d = Math.hypot(c.x - cw.x, c.y - cw.y);
    if (d < bd) { bd = d; tgt = c; }
  }
  if (!tgt || bd > cfg.fire.snap_radius) return null;
  const { mp } = nearestLMount(cw);
  const cap = GUN.L.range / GUN.L.speed;
  let t = Math.min(Math.hypot(tgt.x - mp.x, tgt.y - mp.y) / GUN.L.speed, cap);
  let gx = tgt.x + tgt.vx * t, gy = tgt.y + tgt.vy * t;
  t = Math.min(Math.hypot(gx - mp.x, gy - mp.y) / GUN.L.speed, cap);
  gx = tgt.x + tgt.vx * t; gy = tgt.y + tgt.vy * t;
  return { tgt, gx, gy };
}
function drawReticle() {
  const held = rmbHeld;
  const col = held ? "rgba(217,79,43,0.95)" : "rgba(228,240,242,0.35)";
  const r = held ? 14 : 9;
  ctx.strokeStyle = col; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(mouse.x, mouse.y, r, 0, TAU); ctx.stroke();
  for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
    ctx.beginPath();
    ctx.moveTo(mouse.x + dx * (r - 4), mouse.y + dy * (r - 4));
    ctx.lineTo(mouse.x + dx * (r + 5), mouse.y + dy * (r + 5));
    ctx.stroke();
  }
  if (!held) return;
  const cw = cursorWorld();
  ctx.font = `10px ${MONO_FONT}`;
  ctx.fillStyle = col;
  ctx.fillText("MAIN BATTERY", mouse.x + 18, mouse.y - 12);
  if (cfg.fire.show_time) {
    const { dist } = nearestLMount(cw);
    const inRange = dist <= GUN.L.range;
    const text = inRange
      ? `${(dist / GUN.L.speed).toFixed(1)} s · ${Math.round(dist)} u`
      : "MAX RANGE · BEARING";
    ctx.font = `10.5px ${MONO_FONT}`;
    ctx.textAlign = "center";
    ctx.fillStyle = inRange ? "rgba(228,240,242,0.9)" : "rgba(217,79,43,0.95)";
    ctx.fillText(text, mouse.x, mouse.y + 30);
    ctx.textAlign = "left";
  }
  const rk = rangekeeperSolve(cw);
  if (rk) {   // ghost diamond + tether — advisory steel/foam, never the hostile red
    const [gx, gy] = w2s(rk.gx, rk.gy);
    const [tx, ty] = w2s(rk.tgt.x, rk.tgt.y);
    ctx.strokeStyle = "rgba(147,167,174,0.55)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(gx, gy); ctx.stroke();
    ctx.strokeStyle = "rgba(228,240,242,0.9)"; ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(gx, gy - 6); ctx.lineTo(gx + 6, gy); ctx.lineTo(gx, gy + 6); ctx.lineTo(gx - 6, gy);
    ctx.closePath(); ctx.stroke();
    ctx.fillStyle = "rgba(147,167,174,0.9)";
    ctx.font = `9px ${MONO_FONT}`;
    ctx.fillText("RK", gx + 9, gy - 8);
  }
}

/* ════════════════════════════ C11 — MINI RADAR SCOPE (HelmGauges language) ════════════════════════════
   Bottom-right circular scope, north-up, ship-centered, 2200 u range — the game's radar
   vocabulary: dark plate + brass edge, faint 500 u rings, dashed mb16 900 u ring, viewport
   rect off the LIVE zoom, cosmetic sweep, red fire-control bearing line while forcing,
   gunboats as red squares, swarmers as red dots, hostile shells as faint orange motes.
   THE C11 POINT — fall of shot: own in-flight mb16 shells as foam dots, each burst a brief
   expanding foam ring flash (life = the panel knob). HUD — no lw(), no zoom transform. */
const SCOPE_R = 85, SCOPE_RANGE = 2200;
function drawScope() {
  const R = SCOPE_R, k = R / SCOPE_RANGE;
  const cx = W - R - 26, cy = H - R - 26;
  const rel = (wx, wy) => [(wx - ship.x) * k, (wy - ship.y) * k];   // world is already north-up
  ctx.fillStyle = "rgba(13,32,40,0.9)";
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU); ctx.fill();
  ctx.strokeStyle = "rgba(205,186,142,0.5)"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU); ctx.stroke();
  ctx.strokeStyle = "rgba(205,186,142,0.16)";
  for (let d = 500; d < SCOPE_RANGE; d += 500) {
    ctx.beginPath(); ctx.arc(cx, cy, d * k, 0, TAU); ctx.stroke();
  }
  /* C15 — the land on the scope: dim solid brass-gray masses, unmistakably not blips (blips
     are red squares/dots, shot is foam). Bodies only (no shoal), clipped to the scope face;
     tiny reefs get a 1.5 px dot floor so a reef line still charts. */
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU); ctx.clip();
  ctx.fillStyle = "rgba(150,138,106,0.4)";
  for (const F of TERRAIN) {
    const [tox, toy] = rel(F.x, F.y);
    if (Math.hypot(tox, toy) > R + F.r * k) continue;
    for (const B of F.polys) {
      if (B.r * k < 2) {
        const [bx, by] = rel(B.x, B.y);
        ctx.beginPath(); ctx.arc(cx + bx, cy + by, Math.max(B.r * k, 1.5), 0, TAU); ctx.fill();
      } else {
        ctx.beginPath();
        const [m0x, m0y] = rel(B.pts[0][0], B.pts[0][1]);
        ctx.moveTo(cx + m0x, cy + m0y);
        for (let j = 1; j < B.pts.length; j++) {
          const [mx, my] = rel(B.pts[j][0], B.pts[j][1]);
          ctx.lineTo(cx + mx, cy + my);
        }
        ctx.closePath(); ctx.fill();
      }
    }
  }
  ctx.restore();
  ctx.strokeStyle = "rgba(205,186,142,0.35)";        // main-battery reach, dashed (the game's ring)
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.arc(cx, cy, GUN.L.range * k, 0, TAU); ctx.stroke();
  ctx.setLineDash([]);
  const vw = (W / 2 / cfg.view.zoom) * k, vh = (H / 2 / cfg.view.zoom) * k;   // viewport extent, live zoom
  ctx.strokeStyle = "rgba(228,240,242,0.14)";
  ctx.strokeRect(cx - vw, cy - vh, vw * 2, vh * 2);
  if (!reducedMotion) {                              // sweep — cosmetic, wall clock, never the sim's
    const sw = (performance.now() * 0.0016) % TAU;
    ctx.strokeStyle = "rgba(205,186,142,0.3)";
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.sin(sw) * R, cy - Math.cos(sw) * R); ctx.stroke();
  }
  if (rmbHeld) {                                     // fire-control bearing line (gate rev 2 language)
    const cw2 = cursorWorld();
    const bd = dirOf(angleTo(ship, cw2));
    const mr = GUN.L.range * k;
    ctx.strokeStyle = "rgba(217,79,43,0.7)"; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + bd.x * mr, cy + bd.y * mr); ctx.stroke();
    ctx.strokeStyle = "rgba(217,79,43,0.3)";
    ctx.beginPath(); ctx.moveTo(cx + bd.x * mr, cy + bd.y * mr); ctx.lineTo(cx + bd.x * R, cy + bd.y * R); ctx.stroke();
    ctx.strokeStyle = "rgba(217,79,43,0.9)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx + bd.x * mr, cy + bd.y * mr, 2.6, 0, TAU); ctx.stroke();
  }
  for (const b of boats) {                           // gunboats — red squares
    const [ox, oy] = rel(b.x, b.y);
    if (Math.hypot(ox, oy) > R) continue;
    ctx.fillStyle = "#D94F2B";
    ctx.fillRect(cx + ox - 2.8, cy + oy - 2.8, 5.6, 5.6);
  }
  for (const s of swarmers) {                        // swarmers — red dots
    const [ox, oy] = rel(s.x, s.y);
    if (Math.hypot(ox, oy) > R) continue;
    ctx.fillStyle = "#D94F2B";
    ctx.beginPath(); ctx.arc(cx + ox, cy + oy, 2.4, 0, TAU); ctx.fill();
  }
  for (const p of shells) {                          // FALL OF SHOT: own mb16 = foam dots; hostile = orange motes
    const [ox, oy] = rel(p.x, p.y);
    if (Math.hypot(ox, oy) > R) continue;
    if (!p.hostile && p.kind === "mb16") {
      ctx.fillStyle = "rgba(228,240,242,0.95)";
      ctx.fillRect(cx + ox - 1, cy + oy - 1, 2, 2);
    } else if (p.hostile) {
      ctx.fillStyle = "rgba(233,103,66,0.8)";
      ctx.fillRect(cx + ox - 0.8, cy + oy - 0.8, 1.6, 1.6);
    }
  }
  for (let i = scopeFlashes.length - 1; i >= 0; i--) {   // burst flashes — brief expanding foam rings
    const f = scopeFlashes[i], kk = (simT - f.t0) / Math.max(0.1, cfg.fire.flash_life);
    if (kk >= 1) { scopeFlashes.splice(i, 1); continue; }
    const [ox, oy] = rel(f.x, f.y);
    if (Math.hypot(ox, oy) > R) continue;
    ctx.strokeStyle = `rgba(228,240,242,${(0.9 * (1 - kk)).toFixed(3)})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(cx + ox, cy + oy, 1.5 + kk * 6, 0, TAU); ctx.stroke();
  }
  const f = dirOf(ship.heading);                     // own ship + heading tick
  ctx.strokeStyle = "#E4F0F2"; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(cx - f.x * 4, cy - f.y * 4); ctx.lineTo(cx + f.x * 7, cy + f.y * 7); ctx.stroke();
  ctx.fillStyle = "#E4F0F2";
  ctx.beginPath(); ctx.arc(cx, cy, 2, 0, TAU); ctx.fill();
  ctx.fillStyle = "#8E815F";
  ctx.font = `9px ${MONO_FONT}`;
  ctx.textAlign = "center";
  ctx.fillText("R A D A R", cx, cy - R - 8);
  ctx.textAlign = "left";
}

/* ════════════════════════════ MAIN LOOP — fixed step, render decoupled ════════════════════════════ */
function render() {
  ctx.fillStyle = "#0A1E28";
  ctx.fillRect(0, 0, W, H);
  drawSwell(seaT);
  drawGrid();
  drawGlints(seaT);
  drawFlecks(seaT, reducedMotion);
  drawStreaks();
  drawTerrain(seaT, reducedMotion);   // C15 — the waters live between the sea and the war
  drawWake();
  drawSplashWater(reducedMotion);
  drawBoats(reducedMotion);
  drawSwarmers();
  drawShip(reducedMotion);
  drawTracers();
  drawSplashPlumes(reducedMotion);
  drawFxAbove();
  drawZoomReadout();
  drawScope();      // C11 — fall of shot lives here
  drawReticle();    // C11 — forced reticle + flight time + RANGEKEEPER ghost, topmost
}
let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  // the camera chases the wheel target every RENDER frame — pause freezes the war, not the
  // camera, so a frozen moment can be judged at every zoom. Exponential smoothing: half the
  // remaining distance every half_life seconds, frame-rate independent.
  cfg.view.zoom += (targetZoom - cfg.view.zoom)
                 * (1 - Math.pow(0.5, dt / Math.max(0.001, cfg.zoom.half_life)));
  if (!paused) {
    acc += dt;
    while (acc >= SIM_DT) {
      acc -= SIM_DT;
      simT += SIM_DT;
      if (!reducedMotion) seaT += SIM_DT;    // reduced motion: the war continues, the water holds still
      const inp = readInput();
      stepShip(inp, SIM_DT); collideShip(SIM_DT);   // C15 — the waters push back
      stepBoats(SIM_DT); stepSwarmers(SIM_DT); stepMounts(SIM_DT);
      stepShells(SIM_DT); stepEvents(SIM_DT); stepWake(SIM_DT); stepStreaks(SIM_DT, reducedMotion);
    }
  }
  cam.x = ship.x; cam.y = ship.y;
  render();
}
buildPanel();
applyPreset("B");    // sea C9 · camera C10 · fire C11 — all locked. C15 judges the waters, nothing else
generateTerrain();   // the archipelago, from cfg.terrain.seed — deterministic, scene rng untouched
initBoats();         // boats integrate velocity now; start them on-orbit, clear of the rocks
requestAnimationFrame(frame);
</script>
</body>
</html>
